<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#667eea" />
  <title>Tres en Raya - BerMatCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --secondary: #764ba2;
      --success: #2ecc71;
      --danger: #e74c3c;
      --warning: #f39c12;
      --bg: #f8f9fc;
      --card: #ffffff;
      --text: #1a1a2e;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 24px;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .view { display: none; animation: fadeIn 0.3s; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      text-align: center;
    }
    input:focus { outline: none; border-color: var(--primary); }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { background: var(--primary-dark); transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button.secondary { background: #95a5a6; }
    button.success { background: var(--success); }
    button.danger { background: var(--danger); }

    .code-box {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      margin: 20px 0;
    }

    .players {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .player-card {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: var(--bg);
      text-align: center;
      border: 3px solid transparent;
      transition: 0.3s;
    }
    .player-card.active { border-color: var(--primary); background: #f0f4ff; }
    .player-card.me { background: var(--primary); color: white; }
    .player-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .player-symbol { font-size: 20px; font-weight: 700; }

    .status {
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      margin: 16px 0;
      background: var(--bg);
    }
    .status.my-turn { background: var(--success); color: white; animation: pulse 2s infinite; }
    .status.their-turn { background: var(--text); color: white; }
    .status.finished { background: var(--danger); color: white; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px auto;
      max-width: 300px;
    }
    .cell {
      aspect-ratio: 1;
      background: var(--bg);
      border: 3px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.25s;
      font-size: 36px;
      font-weight: 700;
    }
    .cell:hover:not(.taken) { background: #eef1ff; border-color: var(--primary); transform: scale(1.03); }
    .cell.x { color: var(--danger); background: #ffeaea; border-color: var(--danger); }
    .cell.o { color: var(--primary); background: #eaf4ff; border-color: var(--primary); }
    .cell.taken { cursor: default; }
    .cell.winner { background: var(--success); color: white; border-color: var(--success); animation: winPop 0.4s; }
    @keyframes winPop { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }
    .modal.active { opacity: 1; pointer-events: all; }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      transform: scale(0.9);
      transition: 0.3s;
    }
    .modal.active .modal-content { transform: scale(1); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .modal-text { font-size: 14px; color: #666; margin-bottom: 20px; }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons button { flex: 1; margin: 0; }

    .credits {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <h1>Tres en Raya</h1>

  <!-- MENU -->
  <div id="view-menu" class="view active">
    <button onclick="showView('view-create')">Crear Sala</button>
    <button onclick="showView('view-join')" class="secondary">Unirse a Sala</button>
  </div>

  <!-- CREAR -->
  <div id="view-create" class="view">
    <input type="text" id="name-create" placeholder="Tu nombre" maxlength="12">
    <button onclick="createRoom()">Generar Sala</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- ESPERANDO -->
  <div id="view-waiting" class="view">
    <p style="text-align:center;color:#666;margin-bottom:10px">Comparte este código:</p>
    <div id="room-code" class="code-box">------</div>
    <button onclick="copyCode()">Copiar Código</button>
    <p style="text-align:center;margin:15px 0;color:#666">Esperando jugador...</p>
    <button onclick="leaveGame()" class="secondary">Cancelar</button>
  </div>

  <!-- UNIRSE -->
  <div id="view-join" class="view">
    <input type="text" id="name-join" placeholder="Tu nombre" maxlength="12">
    <input type="text" id="code-join" placeholder="Código (6 letras)" maxlength="6" style="text-transform:uppercase">
    <button onclick="joinRoom()">Unirse</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- JUEGO -->
  <div id="view-game" class="view">
    <div class="players">
      <div id="card-p1" class="player-card">
        <div class="player-name" id="name-p1">Jugador 1</div>
        <div class="player-symbol">X</div>
      </div>
      <div id="card-p2" class="player-card">
        <div class="player-name" id="name-p2">Jugador 2</div>
        <div class="player-symbol">O</div>
      </div>
    </div>

    <div id="status" class="status">Conectando...</div>
    <div id="board" class="board"></div>

    <button id="btn-rematch" onclick="requestRematch()" class="hidden success">Solicitar Revancha</button>
    <button onclick="leaveGame()" class="secondary">Salir</button>
  </div>
</div>

<div class="credits">BerMatCode</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div id="modal-title" class="modal-title">Título</div>
    <div id="modal-text" class="modal-text">Mensaje</div>
    <div id="modal-buttons" class="modal-buttons">
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-MIB8DbCF3YDAqb2qGRO6sjgUzg-sb-I",
    authDomain: "tres-en-raya1.firebaseapp.com",
    projectId: "tres-en-raya1",
    storageBucket: "tres-en-raya1.firebasestorage.app",
    messagingSenderId: "728066446875",
    appId: "1:728066446875:web:d80726479234f1cf580abe",
    measurementId: "G-P41C6EYSRT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let roomId = null;
  let myName = "";
  let myPlayer = null;
  let mySymbol = null;
  let gameData = null;
  let unsubscribe = null;

  window.showView = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };

  window.showModal = (title, text, buttons = [{text: 'Cerrar', onclick: closeModal}]) => {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    const btnContainer = document.getElementById('modal-buttons');
    btnContainer.innerHTML = '';
    buttons.forEach(btn => {
      const b = document.createElement('button');
      b.textContent = btn.text;
      b.className = btn.class || '';
      b.onclick = btn.onclick;
      btnContainer.appendChild(b);
    });
    document.getElementById('modal').classList.add('active');
  };

  window.closeModal = () => {
    document.getElementById('modal').classList.remove('active');
  };

  function generateCode() {
    const chars = "BERMATCODE";
    return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  }

  window.createRoom = async () => {
    myName = document.getElementById('name-create').value.trim();
    if (!myName) return showModal("Error", "Ingresa tu nombre");

    roomId = generateCode();
    myPlayer = 1;
    mySymbol = 'X';

    try {
      await setDoc(doc(db, "games", roomId), {
        player1: myName,
        player2: null,
        board: ["", "", "", "", "", "", "", "", ""],
        turn: "player1",
        winner: null,
        winningCells: null,
        status: "waiting",
        rematchRequestedBy: null,
        rematchStatus: "none",
        createdAt: serverTimestamp()
      });

      document.getElementById('room-code').textContent = roomId;
      showView('view-waiting');

      unsubscribe = onSnapshot(doc(db, "games", roomId), (snap) => {
        if (snap.exists()) {
          const data = snap.data();
          if (data.player2 && data.status === "playing") {
            startGame(data);
          }
        }
      });
    } catch (error) {
      showModal("Error", "No se pudo crear la sala: " + error.message);
    }
  };

  window.joinRoom = async () => {
    myName = document.getElementById('name-join').value.trim();
    const code = document.getElementById('code-join').value.trim().toUpperCase();

    if (!myName || !code || code.length !== 6) {
      return showModal("Error", "Completa nombre y código válido");
    }

    try {
      const snap = await getDoc(doc(db, "games", code));
      if (!snap.exists()) return showModal("Error", "Sala no encontrada");

      const data = snap.data();
      if (data.player2) return showModal("Error", "Sala llena");
      if (data.status !== "waiting") return showModal("Error", "Partida no disponible");

      roomId = code;
      myPlayer = 2;
      mySymbol = 'O';

      await updateDoc(doc(db, "games", roomId), {
        player2: myName,
        status: "playing"
      });

      unsubscribe = onSnapshot(doc(db, "games", roomId), (snap) => {
        if (snap.exists()) {
          startGame(snap.data());
        }
      });
    } catch (error) {
      showModal("Error", "No se pudo unir: " + error.message);
    }
  };

  function startGame(data) {
    showView('view-game');
    gameData = data;

    const isP1 = myPlayer === 1;
    document.getElementById('name-p1').textContent = data.player1;
    document.getElementById('name-p2').textContent = data.player2 || "Esperando...";

    document.getElementById('card-p1').className = 'player-card' + (isP1 ? ' me' : '');
    document.getElementById('card-p2').className = 'player-card' + (!isP1 ? ' me' : '');

    unsubscribe = onSnapshot(doc(db, "games", roomId), (snap) => {
      if (snap.exists()) {
        gameData = snap.data();
        updateUI();
      }
    });
  }

  function updateUI() {
    if (!gameData) return;

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const rematchBtn = document.getElementById('btn-rematch');
    
    const isMyTurn = gameData.turn === `player${myPlayer}` && !gameData.winner;
    
    // Actualizar tarjetas
    document.getElementById('card-p1').classList.remove('active');
    document.getElementById('card-p2').classList.remove('active');
    if (!gameData.winner) {
      document.getElementById(gameData.turn === 'player1' ? 'card-p1' : 'card-p2').classList.add('active');
    }

    // Renderizar tablero
    boardEl.innerHTML = '';
    gameData.board.forEach((cell, idx) => {
      const div = document.createElement('div');
      div.className = 'cell' + (cell ? ` ${cell.toLowerCase()} taken` : '');
      
      if (gameData.winningCells && gameData.winningCells.includes(idx)) {
        div.classList.add('winner');
      }
      
      div.textContent = cell;
      
      if (!cell && isMyTurn && !gameData.winner) {
        div.onclick = () => makeMove(idx);
      }
      
      boardEl.appendChild(div);
    });

    // Actualizar estado
    statusEl.className = 'status';
    if (gameData.winner) {
      statusEl.classList.add('finished');
      if (gameData.winner === 'draw') {
        statusEl.textContent = 'Empate';
      } else if (gameData.winner === `player${myPlayer}`) {
        statusEl.textContent = 'Ganaste';
      } else {
        statusEl.textContent = 'Perdiste';
      }
      rematchBtn.classList.remove('hidden');
    } else if (isMyTurn) {
      statusEl.classList.add('my-turn');
      statusEl.textContent = 'Tu turno';
      rematchBtn.classList.add('hidden');
    } else {
      statusEl.classList.add('their-turn');
      statusEl.textContent = `Turno de ${myPlayer === 1 ? gameData.player2 : gameData.player1}`;
      rematchBtn.classList.add('hidden');
    }

    // Manejar revancha
    if (gameData.rematchRequestedBy && gameData.rematchStatus === 'pending') {
      const requester = gameData.rematchRequestedBy === 1 ? gameData.player1 : gameData.player2;
      if (gameData.rematchRequestedBy !== myPlayer) {
        showModal("Revancha", `${requester} quiere revancha`, [
          { text: "Aceptar", onclick: acceptRematch, class: "success" },
          { text: "Rechazar", onclick: rejectRematch, class: "danger" }
        ]);
      }
    }
  }

  window.makeMove = async (idx) => {
    if (!gameData || gameData.board[idx] || gameData.winner || gameData.turn !== `player${myPlayer}`) {
      return;
    }

    const newBoard = [...gameData.board];
    newBoard[idx] = mySymbol;

    const winner = checkWinner(newBoard);
    const isDraw = !winner && !newBoard.includes("");

    const updateData = {
      board: newBoard
    };

    if (winner) {
      updateData.winner = winner;
      updateData.winningCells = getWinningCells(newBoard, winner);
      updateData.status = "finished";
    } else if (isDraw) {
      updateData.winner = 'draw';
      updateData.status = "finished";
    } else {
      updateData.turn = myPlayer === 1 ? 'player2' : 'player1';
    }

    try {
      await updateDoc(doc(db, "games", roomId), updateData);
    } catch (error) {
      console.error("Error making move:", error);
    }
  };

  function checkWinner(board) {
    const wins = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];
    
    for (const [a, b, c] of wins) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return board[a] === 'X' ? 'player1' : 'player2';
      }
    }
    return null;
  }

  function getWinningCells(board, winner) {
    const wins = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];
    
    for (const [a, b, c] of wins) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return [a, b, c];
      }
    }
    return [];
  }

  window.requestRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), {
        rematchRequestedBy: myPlayer,
        rematchStatus: "pending"
      });
    } catch (error) {
      console.error(error);
    }
  };

  window.acceptRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), {
        board: ["", "", "", "", "", "", "", "", ""],
        turn: "player1",
        winner: null,
        winningCells: null,
        rematchRequestedBy: null,
        rematchStatus: "none",
        status: "playing"
      });
      closeModal();
    } catch (error) {
      console.error(error);
    }
  };

  window.rejectRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), {
        rematchRequestedBy: null,
        rematchStatus: "rejected"
      });
      closeModal();
    } catch (error) {
      console.error(error);
    }
  };

  window.copyCode = () => {
    navigator.clipboard.writeText(roomId).then(() => {
      showModal("Copiado", "Código copiado al portapapeles");
    });
  };

  window.leaveGame = async () => {
    if (unsubscribe) unsubscribe();
    if (roomId && myPlayer === 1) {
      try { await deleteDoc(doc(db, "games", roomId)); } catch(e) {}
    }
    roomId = null;
    myName = "";
    myPlayer = null;
    gameData = null;
    document.getElementById('btn-rematch').classList.add('hidden');
    showView('view-menu');
    document.getElementById('name-create').value = '';
    document.getElementById('name-join').value = '';
    document.getElementById('code-join').value = '';
  };

  // Inicializar
  document.getElementById('board').innerHTML = Array(9).fill('<div class="cell"></div>').join('');
</script>
</body>
</html>
