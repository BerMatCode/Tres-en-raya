<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-status-bar-style" content="#667eea" />
  <title>Tres en Raya - BerMatCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --secondary: #764ba2;
      --success: #2ecc71;
      --danger: #e74c3c;
      --p1-color: #7ec8e3;
      --p2-color: #ffffff;
      --p2-text: #333333;
      --bg: #f8f9fc;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app-container {
      background: var(--card);
      border-radius: 24px;
      padding: 28px 22px;
      max-width: 380px;
      width: 92%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 24px;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .view { display: none; width: 100%; animation: slideIn 0.3s ease; }
    .view.active { display: block; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      text-align: center;
      font-weight: 500;
      transition: all 0.3s;
      background: var(--bg);
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15); background: white; }

    button {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(102, 126, 234, 0.4); }
    button:active { transform: translateY(0); }
    button.secondary { background: linear-gradient(135deg, #95a5a6, #7f8c8d); box-shadow: 0 4px 12px rgba(149, 165, 166, 0.3); }
    button.success { background: linear-gradient(135deg, var(--success), #27ae60); box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); }
    button.danger { background: linear-gradient(135deg, var(--danger), #c0392b); box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .code-box {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 22px;
      border-radius: 16px;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 5px;
      margin: 18px 0;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.35);
    }

    .players { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 16px; width: 100%; }
    .player-card {
      flex: 1; padding: 12px; border-radius: 12px; background: var(--bg);
      text-align: center; border: 2px solid transparent; transition: all 0.3s;
    }
    .player-card.active { border-color: var(--primary); background: #f0f4ff; transform: scale(1.03); }
    .player-card.me { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .player-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .player-symbol { font-size: 18px; font-weight: 700; }

    .status {
      padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; font-size: 14px;
      margin: 14px 0; width: 100%; transition: all 0.3s; background: var(--bg); color: var(--text-muted);
    }
    .status.my-turn { background: linear-gradient(135deg, var(--success), #27ae60); color: white; animation: pulse 2s infinite; }
    .status.their-turn { background: linear-gradient(135deg, var(--text-muted), #95a5a6); color: white; }
    .status.finished { background: linear-gradient(135deg, var(--danger), #c0392b); color: white; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }

    .board {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin: 16px auto; width: 100%; max-width: 260px;
    }
    .cell {
      aspect-ratio: 1; background: var(--bg); border: 3px solid var(--border); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 34px; font-weight: 700;
    }
    .cell:hover:not(.taken) { background: #eef1ff; border-color: var(--primary); transform: scale(1.03); }
    .cell.x { color: var(--danger); background: #ffeaea; border-color: var(--danger); }
    .cell.o { color: var(--primary); background: #eaf4ff; border-color: var(--primary); }
    .cell.taken { cursor: default; }
    .cell.winner { background: linear-gradient(135deg, var(--success), #27ae60); color: white; border-color: var(--success); animation: winPop 0.4s; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
    @keyframes winPop { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    /* BOTONES FLOTANTES */
    .float-btn {
      position: fixed; bottom: 25px; width: 52px; height: 52px; border-radius: 50%;
      background: white; color: var(--primary); font-size: 24px;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25); cursor: pointer; z-index: 50;
      transition: transform 0.2s; border: 2px solid var(--primary);
    }
    .float-btn:hover { transform: scale(1.1); }
    .float-btn .badge {
      position: absolute; top: -4px; right: -4px;
      width: 20px; height: 20px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 11px; display: none;
      align-items: center; justify-content: center; font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #btn-reactions { left: 25px; }
    #btn-chat { right: 25px; }

    /* PICKER EMOJIS */
    .emoji-picker {
      position: fixed; bottom: 85px; left: 20px;
      background: white; border-radius: 16px; padding: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      display: none; grid-template-columns: repeat(3, 1fr); gap: 8px;
      z-index: 55; animation: popUp 0.25s ease;
    }
    .emoji-picker.active { display: grid; }
    @keyframes popUp { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .emoji-btn {
      width: 40px; height: 40px; border: none; background: var(--bg);
      border-radius: 10px; font-size: 22px; cursor: pointer; transition: 0.2s;
      margin: 0; padding: 0; box-shadow: none;
    }
    .emoji-btn:hover { background: #eef1ff; transform: scale(1.1); }

    /* REACCIÓN BURBUJA */
    .reaction-bubble {
      position: fixed; width: 80px; height: 80px;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
      border-radius: 50%; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      z-index: 60; cursor: grab; touch-action: none;
      border: 2px solid var(--primary);
      transition: transform 0.1s;
    }
    .reaction-bubble:active { cursor: grabbing; transform: scale(1.05); }
    .reaction-emoji { font-size: 32px; pointer-events: none; }
    .reaction-sender { font-size: 10px; font-weight: 600; color: var(--primary); margin-top: 2px; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
    .bubble-dismiss {
      position: absolute; top: -4px; right: -4px;
      width: 20px; height: 20px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid white; z-index: 61;
    }

    /* VENTANA DE CHAT ESTILO WHATSAPP */
    .chat-window {
      position: fixed; bottom: 90px; right: 20px;
      width: 320px; max-width: 88vw; height: 450px; max-height: 75vh;
      background: #efe7dd; /* Fondo estilo WhatsApp */
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      display: none; flex-direction: column;
      z-index: 70; animation: chatSlide 0.3s ease;
      overflow: hidden;
      border: 2px solid var(--primary);
    }
    .chat-window.active { display: flex; }
    @keyframes chatSlide { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .chat-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .chat-header h3 { font-size: 15px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px; }
    .chat-close {
      width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.2);
      border: none; color: white; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: 0.2s; margin: 0; padding: 0; box-shadow: none;
    }
    .chat-close:hover { background: rgba(255,255,255,0.3); }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 5px; }

    .chat-msg {
      max-width: 80%; padding: 10px 14px; border-radius: 16px;
      font-size: 13px; line-height: 1.4; animation: msgPop 0.2s ease;
      position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    @keyframes msgPop { from { opacity: 0; transform: scale(0.95) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    
    .chat-msg.p1 {
      background: var(--p1-color); color: var(--text);
      align-self: flex-start; border-bottom-left-radius: 4px;
    }
    .chat-msg.p2 {
      background: var(--p2-color); color: var(--p2-text);
      align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid #e0e0e0;
    }
    .chat-msg .msg-name { font-size: 11px; font-weight: 700; margin-bottom: 3px; opacity: 0.75; }
    .chat-msg .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }

    .chat-input-area {
      padding: 10px 12px; border-top: 1px solid rgba(0,0,0,0.1);
      display: flex; gap: 8px; background: white; flex-shrink: 0;
    }
    .chat-input-area input {
      flex: 1; margin: 0; padding: 10px 14px; border-radius: 20px;
      text-align: left; font-size: 14px; background: #f5f5f5; border: 1px solid #ddd;
    }
    .chat-input-area input:focus { background: white; border-color: var(--primary); }
    .chat-input-area button {
      width: 42px; height: 42px; border-radius: 50%; margin: 0; padding: 0;
      font-size: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }

    .chat-empty {
      text-align: center; color: #888; font-size: 13px; padding: 40px 10px;
      flex: 1; display: flex; align-items: center; justify-content: center;
    }

    /* NOTIFICACIÓN TOAST */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
      background: white; padding: 12px 20px; border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2); z-index: 200;
      display: flex; align-items: center; gap: 10px;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border-left: 4px solid var(--primary);
    }
    .toast.active { transform: translateX(-50%) translateY(0); }
    .toast-icon { font-size: 20px; }
    .toast-text { font-size: 14px; font-weight: 600; color: var(--text); }

    /* MODALES */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-content {
      background: white; border-radius: 20px; padding: 28px 24px;
      max-width: 300px; width: 85%; text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-loader { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; margin: 0 auto 18px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .modal-text { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 18px; }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons button { flex: 1; margin: 0; padding: 12px; }

    .credits {
      font-family: 'Pacifico', cursive;
      font-size: 18px; color: white; text-align: center;
      margin-top: 20px; text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      opacity: 0.95;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app-container">
  <h1>Tres en Raya</h1>

  <!-- MENÚ -->
  <div id="view-menu" class="view active">
    <button onclick="showView('view-create')">Crear Sala Nueva</button>
    <button onclick="showView('view-join')" class="secondary">Unirse a Sala</button>
  </div>

  <!-- CREAR -->
  <div id="view-create" class="view">
    <input type="text" id="name-create" placeholder="Tu nombre" maxlength="12">
    <button onclick="createRoom()">Generar Código</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- ESPERANDO -->
  <div id="view-wait" class="view">
    <p style="text-align:center;color:var(--text-muted);margin-bottom:10px;font-size:14px">Comparte este código:</p>
    <div id="room-code" class="code-box">------</div>
    <button onclick="copyCode()">Copiar Código</button>
    <p style="text-align:center;margin:12px 0;color:var(--text-muted);font-size:13px">Esperando al segundo jugador...</p>
    <button onclick="leaveGame()" class="secondary" style="margin-top:10px">Cancelar y Salir</button>
  </div>

  <!-- UNIRSE -->
  <div id="view-join" class="view">
    <input type="text" id="name-join" placeholder="Tu nombre" maxlength="12">
    <input type="text" id="code-join" placeholder="Código (6 letras)" maxlength="6" style="text-transform:uppercase;letter-spacing:2px">
    <button onclick="joinRoom()">Unirse a la Sala</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- JUEGO -->
  <div id="view-game" class="view">
    <div class="players">
      <div id="card-p1" class="player-card">
        <div class="player-name" id="name-p1">Jugador 1</div>
        <div class="player-symbol">X</div>
      </div>
      <div id="card-p2" class="player-card">
        <div class="player-name" id="name-p2">Jugador 2</div>
        <div class="player-symbol">O</div>
      </div>
    </div>

    <div id="status" class="status">Conectando...</div>
    <div id="board" class="board"></div>

    <button id="btn-rematch" onclick="requestRematch()" class="hidden success">Solicitar Revancha</button>
    <button onclick="leaveGame()" class="secondary">Salir de la Partida</button>
  </div>
</div>

<!-- BURBUJA DE REACCIÓN -->
<div id="bubble" class="reaction-bubble">
  <div class="bubble-dismiss" onclick="dismissReaction(event)">✕</div>
  <div class="reaction-emoji" id="b-emoji"></div>
  <div class="reaction-sender" id="b-sender"></div>
</div>

<!-- BOTONES FLOTANTES -->
<div id="btn-reactions" class="float-btn" onclick="toggleEmojiPicker()">😀</div>
<div id="btn-chat" class="float-btn" onclick="openChat()">
  💬
  <div id="msg-badge" class="badge">0</div>
</div>

<!-- PICKER EMOJIS -->
<div id="emoji-picker" class="emoji-picker">
  <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
  <button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
  <button class="emoji-btn" onclick="sendReaction('😖')">😖</button>
  <button class="emoji-btn" onclick="sendReaction('😡')">😡</button>
  <button class="emoji-btn" onclick="sendReaction('😭')">😭</button>
  <button class="emoji-btn" onclick="sendReaction('😲')">😲</button>
  <button class="emoji-btn" onclick="sendReaction('😁')">😁</button>
  <button class="emoji-btn" onclick="sendReaction('🥰')">🥰</button>
  <button class="emoji-btn" onclick="sendReaction('😍')">😍</button>
</div>

<!-- VENTANA DE CHAT -->
<div id="chat-window" class="chat-window">
  <div class="chat-header">
    <h3>💬 Chat</h3>
    <button class="chat-close" onclick="closeChat()">✕</button>
  </div>
  <div id="chat-messages" class="chat-messages">
    <div class="chat-empty">Aún no hay mensajes</div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="200">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- NOTIFICACIÓN TOAST -->
<div id="toast" class="toast">
  <div class="toast-icon">🔔</div>
  <div id="toast-text" class="toast-text"></div>
</div>

<div class="credits">BerMatCode</div>

<!-- MODAL GENÉRICO -->
<div id="modal" class="modal-overlay">
  <div class="modal-content">
    <div id="modal-loader" class="modal-loader hidden"></div>
    <div id="modal-title" class="modal-title">Título</div>
    <div id="modal-text" class="modal-text">Mensaje</div>
    <div id="modal-buttons" class="modal-buttons">
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-MIB8DbCF3YDAqb2qGRO6sjgUzg-sb-I",
    authDomain: "tres-en-raya1.firebaseapp.com",
    projectId: "tres-en-raya1",
    storageBucket: "tres-en-raya1.firebasestorage.app",
    messagingSenderId: "728066446875",
    appId: "1:728066446875:web:d80726479234f1cf580abe",
    measurementId: "G-P41C6EYSRT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let roomId = null;
  let myName = "";
  let myPlayer = null;
  let gameData = null;
  let unsub = null;
  let unreadCount = 0;
  let lastMsgCount = 0;
  let chatOpen = false;

  // === PERSISTENCIA ===
  function saveSession(id, name, p) {
    localStorage.setItem('tic_room', id);
    localStorage.setItem('tic_name', name);
    localStorage.setItem('tic_player', p);
  }
  function clearSession() {
    localStorage.removeItem('tic_room');
    localStorage.removeItem('tic_name');
    localStorage.removeItem('tic_player');
  }
  function loadSession() {
    const id = localStorage.getItem('tic_room');
    if (id) {
      roomId = id;
      myName = localStorage.getItem('tic_name');
      myPlayer = parseInt(localStorage.getItem('tic_player'));
      return true;
    }
    return false;
  }

  // === NAVEGACIÓN ===
  window.showView = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };

  // === MODALES ===
  window.showLoading = (title, text) => {
    document.getElementById('modal-loader').classList.remove('hidden');
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal-buttons').classList.add('hidden');
    document.getElementById('modal').classList.add('active');
  };

  window.showModal = (title, text, buttons = [{text: 'Cerrar', class: '', onclick: closeModal}]) => {
    document.getElementById('modal-loader').classList.add('hidden');
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    const btns = document.getElementById('modal-buttons');
    btns.classList.remove('hidden');
    btns.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.textContent = b.text;
      btn.className = b.class || '';
      btn.onclick = () => { if(b.onclick) b.onclick(); closeModal(); };
      btns.appendChild(btn);
    });
    document.getElementById('modal').classList.add('active');
  };

  window.closeModal = () => {
    document.getElementById('modal').classList.remove('active');
  };

  // === UTILIDADES ===
  function generateCode() {
    const chars = "BERMATCODE";
    return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts.seconds * 1000 + (ts.nanoseconds || 0) / 1000000);
    return d.toLocaleTimeString('es', {hour: '2-digit', minute: '2-digit'});
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // === CREAR SALA ===
  window.createRoom = async () => {
    myName = document.getElementById('name-create').value.trim();
    if (!myName) return showModal("Error", "Ingresa tu nombre para continuar.");

    showLoading("Creando sala", "Generando código único y preparando la partida...");
    
    setTimeout(async () => {
      roomId = generateCode();
      myPlayer = 1;

      try {
        await setDoc(doc(db, "games", roomId), {
          p1: myName, p2: null,
          board: ["","","","","","","","",""],
          turn: "p1", winner: null, winCells: null,
          status: "waiting", rematchReq: null, rematchStat: "none",
          reaction: null, chat: [], created: serverTimestamp()
        });
        saveSession(roomId, myName, 1);
        closeModal();
        document.getElementById('room-code').textContent = roomId;
        showView('view-wait');
        listenGame();
      } catch (e) {
        closeModal();
        showModal("Error", "No se pudo crear la sala. Verifica tu conexión.");
      }
    }, 1000);
  };

  // === UNIRSE ===
  window.joinRoom = async () => {
    myName = document.getElementById('name-join').value.trim();
    const code = document.getElementById('code-join').value.trim().toUpperCase();

    if (!myName || !code || code.length !== 6) return showModal("Error", "Completa nombre y código válido.");

    showLoading("Uniéndote", "Conectando con la partida...");
    
    setTimeout(async () => {
      try {
        const snap = await getDoc(doc(db, "games", code));
        if (!snap.exists()) return closeModal(), showModal("Error", "Sala no encontrada.");
        const d = snap.data();
        if (d.p2) return closeModal(), showModal("Error", "Sala llena.");
        if (d.status !== "waiting") return closeModal(), showModal("Error", "Partida no disponible.");

        roomId = code;
        myPlayer = 2;
        await updateDoc(doc(db, "games", roomId), { p2: myName, status: "playing" });
        saveSession(roomId, myName, 2);
        closeModal();
        showView('view-game');
        listenGame();
      } catch (e) {
        closeModal();
        showModal("Error", "No se pudo unir a la sala.");
      }
    }, 1000);
  };

  // === ESCUCHAR JUEGO ===
  function listenGame() {
    if (unsub) unsub();
    unsub = onSnapshot(doc(db, "games", roomId), (snap) => {
      if (!snap.exists()) return;
      gameData = snap.data();
      
      if (gameData.status === "playing" || gameData.p2) {
        if (document.getElementById('view-wait').classList.contains('active')) showView('view-game');
        document.getElementById('btn-reactions').style.display = 'flex';
        document.getElementById('btn-chat').style.display = 'flex';
      }

      document.getElementById('name-p1').textContent = gameData.p1;
      document.getElementById('name-p2').textContent = gameData.p2 || "Esperando...";
      
      const isP1 = myPlayer === 1;
      document.getElementById('card-p1').className = 'player-card' + (isP1 ? ' me' : '');
      document.getElementById('card-p2').className = 'player-card' + (!isP1 ? ' me' : '');

      renderBoard();
      updateReactionUI(gameData.reaction || null);
      updateChatUI(gameData.chat || []);

      if (gameData.rematchReq && gameData.rematchStat === "pending" && gameData.rematchReq !== myPlayer) {
        const reqName = gameData.rematchReq === 1 ? gameData.p1 : gameData.p2;
        showModal("Solicitud de revancha", `${reqName} quiere jugar otra partida.`, [
          { text: "Aceptar", class: "success", onclick: acceptRematch },
          { text: "Rechazar", class: "danger", onclick: rejectRematch }
        ]);
      }
    });
  }

  // === RENDERIZAR TABLERO ===
  function renderBoard() {
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const rematchBtn = document.getElementById('btn-rematch');
    
    const isMyTurn = !gameData.winner && gameData.turn === (myPlayer === 1 ? 'p1' : 'p2');
    
    document.getElementById('card-p1').classList.remove('active');
    document.getElementById('card-p2').classList.remove('active');
    if (!gameData.winner) {
      document.getElementById(gameData.turn === 'p1' ? 'card-p1' : 'card-p2').classList.add('active');
    }

    boardEl.innerHTML = '';
    gameData.board.forEach((cell, idx) => {
      const div = document.createElement('div');
      div.className = 'cell' + (cell ? ` ${cell.toLowerCase()} taken` : '');
      if (gameData.winCells && gameData.winCells.includes(idx)) div.classList.add('winner');
      div.textContent = cell;
      if (!cell && isMyTurn && !gameData.winner) div.onclick = () => makeMove(idx);
      boardEl.appendChild(div);
    });

    statusEl.className = 'status';
    if (gameData.winner) {
      statusEl.classList.add('finished');
      statusEl.textContent = gameData.winner === 'draw' ? '¡Empate!' : (gameData.winner === (myPlayer===1?'p1':'p2') ? '¡Ganaste!' : 'Has perdido');
      rematchBtn.classList.remove('hidden');
    } else if (isMyTurn) {
      statusEl.classList.add('my-turn');
      statusEl.textContent = '✓ Tu turno';
      rematchBtn.classList.add('hidden');
    } else {
      statusEl.classList.add('their-turn');
      statusEl.textContent = `Turno de ${myPlayer === 1 ? gameData.p2 : gameData.p1}`;
      rematchBtn.classList.add('hidden');
    }
  }

  // === HACER MOVIMIENTO ===
  window.makeMove = async (idx) => {
    if (!gameData || gameData.board[idx] || gameData.winner || gameData.turn !== (myPlayer===1?'p1':'p2')) return;
    
    const newBoard = [...gameData.board];
    newBoard[idx] = myPlayer === 1 ? 'X' : 'O';
    
    const win = checkWinner(newBoard);
    const isDraw = !win && !newBoard.includes("");
    
    const updateData = { board: newBoard };
    if (win) {
      Object.assign(updateData, { winner: win, winCells: getWinningCells(newBoard, win), status: "finished" });
    } else if (isDraw) {
      Object.assign(updateData, { winner: 'draw', status: "finished" });
    } else {
      updateData.turn = myPlayer === 1 ? 'p2' : 'p1';
    }
    
    try { await updateDoc(doc(db, "games", roomId), updateData); } catch(e) { console.error(e); }
  };

  function checkWinner(b) {
    const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(const [a,c,d] of w) if(b[a] && b[a]===b[c] && b[a]===b[d]) return b[a]==='X'?'p1':'p2';
    return null;
  }
  function getWinningCells(b, winner) {
    const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(const [a,c,d] of w) if(b[a] && b[a]===b[c] && b[a]===b[d]) return [a,c,d];
    return [];
  }

  // === REVANCHA ===
  window.requestRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), { rematchReq: myPlayer, rematchStat: "pending" });
      showModal("Solicitud enviada", "Esperando respuesta del oponente...");
    } catch(e) {}
  };
  window.acceptRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), {
        board: ["","","","","","","","",""], turn: "p1", winner: null, winCells: null,
        rematchReq: null, rematchStat: "none", status: "playing"
      });
    } catch(e) {}
  };
  window.rejectRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), { rematchReq: null, rematchStat: "rejected" });
    } catch(e) {}
  };

  // === CHAT ===
  window.toggleEmojiPicker = () => {
    document.getElementById('emoji-picker').classList.toggle('active');
  };

  window.openChat = () => {
    document.getElementById('emoji-picker').classList.remove('active');
    document.getElementById('chat-window').classList.add('active');
    chatOpen = true;
    unreadCount = 0;
    lastMsgCount = gameData ? (gameData.chat || []).length : 0;
    updateBadge();
    setTimeout(() => {
      const msgs = document.getElementById('chat-messages');
      msgs.scrollTop = msgs.scrollHeight;
    }, 50);
  };

  window.closeChat = () => {
    document.getElementById('chat-window').classList.remove('active');
    chatOpen = false;
  };

  window.sendMessage = async () => {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !gameData) return;
    
    const newMsg = { 
      name: myName, 
      text: text, 
      player: myPlayer, 
      time: serverTimestamp() 
    };
    
    try {
      // Usamos arrayUnion para evitar sobrescrituras concurrentes
      await updateDoc(doc(db, "games", roomId), {
        chat: arrayUnion(newMsg)
      });
      input.value = '';
      input.focus();
    } catch(e) { 
      console.error("Error enviando mensaje:", e);
      showModal("Error", "No se pudo enviar el mensaje. Intenta de nuevo.");
    }
  };

  // Enter para enviar
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement.id === 'chat-input') {
      sendMessage();
    }
  });

  function updateChatUI(chat) {
    if (!chat) chat = [];
    const container = document.getElementById('chat-messages');
    const currentCount = chat.length;
    
    // Notificación si hay mensajes nuevos y chat cerrado
    if (currentCount > lastMsgCount && !chatOpen && currentCount > 0) {
      const newCount = currentCount - lastMsgCount;
      const lastMsg = chat[currentCount - 1];
      showToast(newCount, lastMsg.name);
      unreadCount += newCount;
      updateBadge();
    }
    lastMsgCount = currentCount;

    // Renderizar
    if (currentCount === 0) {
      container.innerHTML = '<div class="chat-empty">Aún no hay mensajes</div>';
      return;
    }

    container.innerHTML = '';
    chat.forEach(msg => {
      const div = document.createElement('div');
      const isP1 = msg.player === 1;
      div.className = `chat-msg ${isP1 ? 'p1' : 'p2'}`;
      div.innerHTML = `
        <div class="msg-name">${msg.name}</div>
        <div>${escapeHtml(msg.text)}</div>
        <div class="msg-time">${formatTime(msg.time)}</div>
      `;
      container.appendChild(div);
    });
    
    // Auto-scroll al fondo
    container.scrollTop = container.scrollHeight;
  }

  function showToast(count, senderName) {
    const toast = document.getElementById('toast');
    const text = count === 1 
      ? `Tienes un nuevo mensaje de ${senderName}` 
      : `Tienes ${count} mensajes nuevos de ${senderName}`;
    document.getElementById('toast-text').textContent = text;
    toast.classList.add('active');
    setTimeout(() => toast.classList.remove('active'), 4000);
  }

  function updateBadge() {
    const badge = document.getElementById('msg-badge');
    if (unreadCount > 0) {
      badge.style.display = 'flex';
      badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
    } else {
      badge.style.display = 'none';
    }
  }

  // === REACCIONES ===
  window.sendReaction = async (emoji) => {
    if (!gameData) return;
    const x = (window.innerWidth / 2) - 40;
    const y = (window.innerHeight / 2) - 150;
    try {
      await updateDoc(doc(db, "games", roomId), {
        reaction: { emoji, sender: myName, x, y }
      });
      document.getElementById('emoji-picker').classList.remove('active');
    } catch(e) { console.error(e); }
  };

  window.dismissReaction = async (e) => {
    e.stopPropagation();
    if (gameData.reaction && gameData.reaction.sender === myName) {
      try { await updateDoc(doc(db, "games", roomId), { reaction: null }); } catch(e) {}
    }
  };

  function updateReactionUI(r) {
    const bubble = document.getElementById('bubble');
    if (!r || !r.emoji) { bubble.style.display = 'none'; return; }
    bubble.style.display = 'flex';
    document.getElementById('b-emoji').textContent = r.emoji;
    document.getElementById('b-sender').textContent = r.sender;
    if (r.x !== undefined && r.y !== undefined) {
      bubble.style.left = r.x + 'px';
      bubble.style.top = r.y + 'px';
    } else {
      bubble.style.left = (window.innerWidth/2 - 40) + 'px';
      bubble.style.top = (window.innerHeight/2 - 150) + 'px';
    }
  }

  // === ARRASTRAR REACCIÓN (AMBOS PUEDEN MOVER) ===
  const bubble = document.getElementById('bubble');
  let isDragging = false;
  
  bubble.addEventListener('pointerdown', (e) => {
    if (!gameData.reaction || !gameData.reaction.emoji) return;
    isDragging = true;
    bubble.setPointerCapture(e.pointerId);
    bubble.style.transition = 'none';
  });

  bubble.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const x = e.clientX - 40;
    const y = e.clientY - 40;
    bubble.style.left = x + 'px';
    bubble.style.top = y + 'px';
  });

  bubble.addEventListener('pointerup', async (e) => {
    if (!isDragging) return;
    isDragging = false;
    bubble.style.transition = 'transform 0.1s';
    bubble.releasePointerCapture(e.pointerId);
    
    if (gameData.reaction) {
      try {
        await updateDoc(doc(db, "games", roomId), {
          "reaction.x": parseInt(bubble.style.left),
          "reaction.y": parseInt(bubble.style.top)
        });
      } catch(e) {}
    }
  });

  // Cerrar menús al tocar fuera
  document.addEventListener('pointerdown', (e) => {
    const emojiPicker = document.getElementById('emoji-picker');
    const btnReactions = document.getElementById('btn-reactions');
    if (!emojiPicker.contains(e.target) && !btnReactions.contains(e.target)) {
      emojiPicker.classList.remove('active');
    }
  });

  // === UTILIDADES ===
  window.copyCode = () => {
    navigator.clipboard.writeText(roomId).then(() => {
      showModal("¡Copiado!", "El código se ha copiado. Compártelo con tu oponente.");
    });
  };

  window.leaveGame = async () => {
    if (unsub) unsub();
    clearSession();
    if (myPlayer === 1 && roomId) {
      try { await deleteDoc(doc(db, "games", roomId)); } catch(e) {}
    }
    document.getElementById('btn-reactions').style.display = 'none';
    document.getElementById('btn-chat').style.display = 'none';
    document.getElementById('emoji-picker').classList.remove('active');
    document.getElementById('chat-window').classList.remove('active');
    document.getElementById('bubble').style.display = 'none';
    document.getElementById('btn-rematch').classList.add('hidden');
    unreadCount = 0; lastMsgCount = 0; chatOpen = false;
    showView('view-menu');
    document.getElementById('name-create').value = '';
    document.getElementById('name-join').value = '';
    document.getElementById('code-join').value = '';
  };

  // === INICIALIZACIÓN ===
  (function init() {
    document.getElementById('board').innerHTML = Array(9).fill('<div class="cell"></div>').join('');
    
    if (loadSession()) {
      showView('view-game');
      listenGame();
    } else {
      showView('view-menu');
    }
  })();
</script>
</body>
</html>
