<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#764ba2" />
  <meta name="apple-mobile-web-app-status-bar-style" content="#764ba2" />
  <title>Tic Tac Toe - BerMatCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #764ba2;
      --primary-dark: #663d91;
      --primary-light: #9b7ebd;
      --accent: #a855f7;
      --success: #2ecc71;
      --danger: #e74c3c;
      --bg-glass: rgba(255, 255, 255, 0.15);
      --bg-glass-strong: rgba(255, 255, 255, 0.25);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.8);
      --border: rgba(255, 255, 255, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      height: 100dvh; width: 100vw;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      /* IMAGEN DE FONDO VISIBLE */
      background: url('https://raw.githubusercontent.com/BerMatCode/Tres-en-raya/main/Fondo%20principal.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* Overlay morado suave para mejorar legibilidad SIN tapar la imagen */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(118, 75, 162, 0.4) 0%, rgba(168, 85, 247, 0.4) 100%);
      z-index: -1;
      pointer-events: none;
    }
    
    .app-container {
      background: rgba(118, 75, 162, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 28px;
      padding: 32px 26px;
      max-width: 390px; width: 94%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
    }

    h1 { 
      text-align: center; 
      color: var(--text); 
      margin-bottom: 28px; 
      font-size: 1.9rem; 
      font-weight: 700; 
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .view { display: none; width: 100%; animation: slideIn 0.35s ease; }
    .view.active { display: block; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    input {
      width: 100%; padding: 15px; margin: 12px 0;
      border: 2px solid var(--border); border-radius: 16px;
      font-size: 16px; text-align: center; font-weight: 500;
      transition: all 0.3s; background: rgba(255,255,255,0.2);
      color: var(--text);
    }
    input::placeholder { color: rgba(255,255,255,0.7); }
    input:focus { 
      outline: none; 
      border-color: var(--primary-light); 
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.3); 
      background: rgba(255,255,255,0.3); 
    }

    button {
      width: 100%; padding: 16px; margin: 10px 0; 
      border: none; border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.25s; position: relative; overflow: hidden;
      box-shadow: 0 5px 18px rgba(118, 75, 162, 0.5);
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(118, 75, 162, 0.6); }
    button:active { transform: translateY(0); }
    button.secondary { 
      background: rgba(255,255,255,0.2); 
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    }
    button.secondary:hover { background: rgba(255,255,255,0.3); }
    button.success { background: linear-gradient(135deg, var(--success), #27ae60); box-shadow: 0 5px 18px rgba(46, 204, 113, 0.5); }
    button.danger { background: linear-gradient(135deg, var(--danger), #c0392b); box-shadow: 0 5px 18px rgba(231, 76, 60, 0.5); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .code-box {
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: var(--text); padding: 24px; border-radius: 18px;
      text-align: center; font-size: 28px; font-weight: 700;
      letter-spacing: 6px; margin: 20px 0; 
      box-shadow: 0 6px 22px rgba(0,0,0,0.2);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .players { display: flex; justify-content: space-between; gap: 14px; margin-bottom: 18px; width: 100%; }
    .player-card {
      flex: 1; padding: 14px; border-radius: 14px; 
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid var(--border);
      text-align: center; transition: all 0.3s;
      color: var(--text);
    }
    .player-card.active { 
      border-color: var(--primary-light); 
      background: rgba(255, 255, 255, 0.3); 
      transform: scale(1.04); 
      box-shadow: 0 4px 16px rgba(118, 75, 162, 0.4);
    }
    .player-card.me { 
      background: linear-gradient(135deg, var(--primary), var(--accent)); 
      border: none;
      box-shadow: 0 4px 16px rgba(118, 75, 162, 0.5);
    }
    .player-name { font-weight: 600; font-size: 13px; margin-bottom: 5px; }
    .player-symbol { font-size: 20px; font-weight: 700; }

    .status {
      padding: 14px; border-radius: 14px; text-align: center; font-weight: 600; font-size: 14px;
      margin: 16px 0; width: 100%; transition: all 0.3s; 
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .status.my-turn { 
      background: linear-gradient(135deg, var(--success), #27ae60); 
      color: white; 
      border: none;
      animation: pulse 2s infinite; 
      box-shadow: 0 4px 16px rgba(46, 204, 113, 0.4);
    }
    .status.their-turn { 
      background: rgba(255, 255, 255, 0.25); 
      color: var(--text);
      border: 1px solid var(--border);
    }
    .status.finished { 
      background: linear-gradient(135deg, var(--danger), #c0392b); 
      color: white; 
      border: none;
      box-shadow: 0 4px 16px rgba(231, 76, 60, 0.4);
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.88; } }

    .board {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin: 18px auto; width: 100%; max-width: 270px;
    }
    .cell {
      aspect-ratio: 1; 
      background: rgba(255, 255, 255, 0.25);
      border: 3px solid var(--border); 
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      font-size: 36px; font-weight: 700;
      color: var(--text);
    }
    .cell:hover:not(.taken) { 
      background: rgba(255, 255, 255, 0.35); 
      border-color: var(--primary-light); 
      transform: scale(1.04); 
      box-shadow: 0 4px 14px rgba(118, 75, 162, 0.4);
    }
    .cell.x { color: #ff8a8a; background: rgba(231, 76, 60, 0.2); border-color: rgba(231, 76, 60, 0.5); }
    .cell.o { color: #a8d8ff; background: rgba(102, 126, 234, 0.2); border-color: rgba(102, 126, 234, 0.5); }
    .cell.taken { cursor: default; }
    .cell.winner { 
      background: linear-gradient(135deg, var(--success), #27ae60); 
      color: white; 
      border-color: var(--success); 
      animation: winPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      box-shadow: 0 6px 20px rgba(46, 204, 113, 0.5); 
    }
    @keyframes winPop { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }

    /* CONTROLES SEPARADOS */
    .left-controls {
      position: fixed; bottom: 30px; left: 30px; z-index: 90; display: none; align-items: center; gap: 12px;
    }
    .right-controls {
      position: fixed; bottom: 30px; right: 30px; z-index: 90; display: none; align-items: center; gap: 12px;
    }
    .left-controls.active { display: flex; }
    .right-controls.active { display: flex; }

    .trigger-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid var(--border);
      color: var(--text); font-size: 24px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3); cursor: pointer;
      transition: transform 0.25s; padding: 0; margin: 0;
    }
    .trigger-btn:hover { transform: scale(1.12); background: rgba(255, 255, 255, 0.35); }

    /* CHAT ESTILO WHATSAPP */
    .chat-window {
      position: fixed; bottom: 92px; right: 30px;
      width: 310px; max-height: 370px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 22px; 
      box-shadow: 0 18px 45px rgba(0,0,0,0.3);
      display: none; flex-direction: column; overflow: hidden;
      z-index: 100;
      animation: popUp 0.35s ease;
    }
    .chat-window.active { display: flex; }
    @keyframes popUp { from { opacity: 0; transform: scale(0.92) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    
    .chat-header {
      padding: 15px; 
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; font-weight: 600; font-size: 14px; 
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .chat-close { 
      background: rgba(255,255,255,0.25); border: none; color: white; 
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer; 
      font-size: 15px; display: flex; align-items: center; justify-content: center; 
      padding: 0; margin: 0; transition: 0.2s;
    }
    .chat-close:hover { background: rgba(255,255,255,0.4); }
    
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 14px; 
      display: flex; flex-direction: column-reverse; gap: 11px;
      background: #f0f2f5; 
      min-height: 210px; max-height: 260px;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 5px; }
    
    .msg {
      max-width: 82%; padding: 11px 15px; border-radius: 18px; 
      font-size: 14px; line-height: 1.45;
      position: relative; word-wrap: break-word; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .msg.me { 
      align-self: flex-end; 
      background: linear-gradient(135deg, #a8d8ff, #90caf9); 
      color: #0a2540; 
      border-bottom-right-radius: 5px; 
      border: 1px solid rgba(144, 202, 249, 0.5);
    }
    .msg.other { 
      align-self: flex-start; 
      background: white; 
      color: #1a1a2e; 
      border-bottom-left-radius: 5px; 
      border: 1px solid rgba(0,0,0,0.1);
    }
    .msg-name { font-size: 11px; font-weight: 700; margin-bottom: 3px; opacity: 0.8; }
    .msg-time { font-size: 10px; opacity: 0.6; text-align: right; margin-top: 5px; display: flex; justify-content: flex-end; align-items: center; gap: 4px; }
    
    .chat-input-area {
      display: flex; padding: 11px; border-top: 1px solid rgba(0,0,0,0.1); 
      background: white; gap: 9px; align-items: center;
    }
    .chat-input-area input { 
      margin: 0; padding: 12px 16px; font-size: 14px; border-radius: 26px; flex: 1; 
      border: 1px solid rgba(0,0,0,0.15); background: #f0f2f5; 
      color: #1a1a2e;
    }
    .chat-input-area input::placeholder { color: rgba(0,0,0,0.5); }
    .chat-input-area button { 
      width: 46px; height: 46px; padding: 0; margin: 0; border-radius: 50%; 
      font-size: 19px; display: flex; align-items: center; justify-content: center; 
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none; box-shadow: 0 4px 14px rgba(118, 75, 162, 0.5);
    }

    /* BADGE DE NOTIFICACIÓN */
    .chat-badge {
      position: absolute; top: -5px; right: -5px;
      width: 22px; height: 22px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 11px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white; z-index: 91; pointer-events: none;
      animation: badgePop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
    }
    @keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }

    /* REACCIONES */
    .emoji-picker {
      position: fixed; bottom: 92px; left: 30px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; padding: 13px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.3);
      display: none; grid-template-columns: repeat(3, 1fr); gap: 9px;
      z-index: 95; animation: popUp 0.3s ease;
    }
    .emoji-picker.active { display: grid; }
    .emoji-btn {
      width: 44px; height: 44px; border: none; background: #f0f2f5;
      border-radius: 13px; font-size: 25px; cursor: pointer; transition: 0.25s;
    }
    .emoji-btn:hover { background: #e4e6e9; transform: scale(1.18); }

    .reaction-bubble {
      position: fixed; width: 92px; height: 92px;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid var(--primary-light);
      border-radius: 50%; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      z-index: 80; cursor: grab; touch-action: none;
      transition: transform 0.12s ease;
    }
    .reaction-bubble:active { cursor: grabbing; transform: scale(1.06); }
    .reaction-emoji { font-size: 38px; pointer-events: none; line-height: 1; }
    .reaction-sender { 
      font-size: 10px; font-weight: 600; color: var(--primary); 
      margin-top: 4px; max-width: 90%; overflow: hidden; 
      text-overflow: ellipsis; white-space: nowrap; pointer-events: none; text-align: center; 
    }
    .bubble-dismiss {
      position: absolute; top: -6px; right: -6px;
      width: 24px; height: 24px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid white; z-index: 81;
      box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
    }

    /* MODALES */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.35s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-content {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 22px; padding: 30px 26px;
      max-width: 310px; width: 88%; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      transform: scale(0.92); transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      color: #1a1a2e;
    }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-loader { width: 50px; height: 50px; border: 4px solid rgba(0,0,0,0.1); border-top-color: var(--primary); border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-title { font-size: 19px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
    .modal-text { font-size: 14px; color: #666; line-height: 1.55; margin-bottom: 20px; }
    .modal-buttons { display: flex; gap: 12px; }
    .modal-buttons button { flex: 1; margin: 0; padding: 13px; }

    /* CRÉDITOS CON BRILLO */
    .credits {
      font-family: 'Pacifico', cursive;
      font-size: 24px;
      color: #ffffff;
      text-align: center;
      margin-top: 28px;
      letter-spacing: 1.5px;
      text-shadow: 
        0 0 12px rgba(255, 255, 255, 0.9), 
        0 0 24px rgba(118, 75, 162, 1), 
        0 0 36px rgba(168, 85, 247, 0.9);
      animation: glowPulse 3.5s infinite alternate;
    }
    @keyframes glowPulse {
      from { text-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 22px rgba(118,75,162,0.85), 0 0 34px rgba(168,85,247,0.75); }
      to { text-shadow: 0 0 18px rgba(255,255,255,1), 0 0 32px rgba(118,75,162,1), 0 0 48px rgba(168,85,247,1); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app-container">
  <h1>Tic Tac Toe</h1>

  <!-- MENÚ -->
  <div id="view-menu" class="view active">
    <button onclick="createRoom()">Crear Sala Nueva</button>
    <button onclick="showView('view-join')" class="secondary">Unirse a Sala</button>
  </div>

  <!-- CREAR -->
  <div id="view-create" class="view">
    <input type="text" id="name-create" placeholder="Tu nombre" maxlength="12">
    <button onclick="createRoom()">Generar Código</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- ESPERANDO -->
  <div id="view-wait" class="view">
    <p style="text-align:center;color:var(--text-muted);margin-bottom:12px;font-size:14px">Comparte este código:</p>
    <div id="room-code" class="code-box">------</div>
    <button onclick="copyCode()">Copiar Código</button>
    <p style="text-align:center;margin:14px 0;color:var(--text-muted);font-size:13px">Esperando al segundo jugador...</p>
    <button onclick="leaveGame()" class="secondary" style="margin-top:12px">Cancelar y Salir</button>
  </div>

  <!-- UNIRSE -->
  <div id="view-join" class="view">
    <input type="text" id="name-join" placeholder="Tu nombre" maxlength="12">
    <input type="text" id="code-join" placeholder="Código (6 letras)" maxlength="6" style="text-transform:uppercase;letter-spacing:2px">
    <button onclick="joinRoom()">Unirse a la Sala</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- JUEGO -->
  <div id="view-game" class="view">
    <div class="players">
      <div id="card-p1" class="player-card">
        <div class="player-name" id="name-p1">Jugador 1</div>
        <div class="player-symbol">X</div>
      </div>
      <div id="card-p2" class="player-card">
        <div class="player-name" id="name-p2">Jugador 2</div>
        <div class="player-symbol">O</div>
      </div>
    </div>

    <div id="status" class="status">Conectando...</div>
    <div id="board" class="board"></div>

    <button id="btn-rematch" onclick="requestRematch()" class="hidden success">Solicitar Revancha</button>
    <button onclick="leaveGame()" class="secondary">Salir de la Partida</button>
  </div>
</div>

<!-- CONTROLES IZQUIERDA (REACCIONES) -->
<div id="reaction-container" class="left-controls">
  <button class="trigger-btn" onclick="toggleEmojiPicker()">😊</button>
</div>

<!-- CONTROLES DERECHA (CHAT) -->
<div id="chat-container" class="right-controls">
  <button class="trigger-btn" onclick="toggleChat()">💬</button>
  <div id="chat-badge" class="chat-badge hidden">0</div>
</div>

<!-- PICKER DE EMOJIS (IZQUIERDA) -->
<div id="emoji-picker" class="emoji-picker">
  <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
  <button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
  <button class="emoji-btn" onclick="sendReaction('😖')">😖</button>
  <button class="emoji-btn" onclick="sendReaction('😡')">😡</button>
  <button class="emoji-btn" onclick="sendReaction('😭')">😭</button>
  <button class="emoji-btn" onclick="sendReaction('😲')">😲</button>
  <button class="emoji-btn" onclick="sendReaction('😁')">😁</button>
  <button class="emoji-btn" onclick="sendReaction('🥰')">🥰</button>
  <button class="emoji-btn" onclick="sendReaction('😍')">😍</button>
</div>

<!-- VENTANA DE CHAT (DERECHA) -->
<div id="chat-window" class="chat-window">
  <div class="chat-header">
    <span>Chat de Sala</span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="100">
    <button id="chat-send" onclick="sendChatMessage()">➤</button>
  </div>
</div>

<!-- BURBUJA DE REACCIÓN -->
<div id="bubble" class="reaction-bubble">
  <div class="bubble-dismiss" onclick="dismissReaction(event)">✕</div>
  <div class="reaction-emoji" id="b-emoji"></div>
  <div class="reaction-sender" id="b-sender"></div>
</div>

<div class="credits">𖤍BerMatCode𖤍</div>

<!-- MODAL GENÉRICO -->
<div id="modal" class="modal-overlay">
  <div class="modal-content">
    <div id="modal-loader" class="modal-loader hidden"></div>
    <div id="modal-title" class="modal-title">Título</div>
    <div id="modal-text" class="modal-text">Mensaje</div>
    <div id="modal-buttons" class="modal-buttons">
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc, serverTimestamp, collection, query, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-MIB8DbCF3YDAqb2qGRO6sjgUzg-sb-I",
    authDomain: "tres-en-raya1.firebaseapp.com",
    projectId: "tres-en-raya1",
    storageBucket: "tres-en-raya1.firebasestorage.app",
    messagingSenderId: "728066446875",
    appId: "1:728066446875:web:d80726479234f1cf580abe",
    measurementId: "G-P41C6EYSRT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let roomId = null, myName = "", myPlayer = null, gameData = null, unsub = null, chatUnsub = null;
  let unreadCount = 0, isChatOpen = false, isDragging = false;

  // === PERSISTENCIA ===
  function saveSession(id, name, p) {
    localStorage.setItem('tic_room', id);
    localStorage.setItem('tic_name', name);
    localStorage.setItem('tic_player', p);
  }
  function clearSession() {
    localStorage.removeItem('tic_room'); localStorage.removeItem('tic_name'); localStorage.removeItem('tic_player');
  }
  function loadSession() {
    const id = localStorage.getItem('tic_room');
    if (id) { roomId = id; myName = localStorage.getItem('tic_name'); myPlayer = parseInt(localStorage.getItem('tic_player')); return true; }
    return false;
  }

  // === NAVEGACIÓN & MODALES ===
  window.showView = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };
  window.showLoading = (t, txt) => {
    document.getElementById('modal-loader').classList.remove('hidden');
    document.getElementById('modal-title').textContent = t;
    document.getElementById('modal-text').textContent = txt;
    document.getElementById('modal-buttons').classList.add('hidden');
    document.getElementById('modal').classList.add('active');
  };
  window.showModal = (t, txt, btns = [{text:'Cerrar', class:'', onclick:closeModal}]) => {
    document.getElementById('modal-loader').classList.add('hidden');
    document.getElementById('modal-title').textContent = t;
    document.getElementById('modal-text').textContent = txt;
    const b = document.getElementById('modal-buttons');
    b.classList.remove('hidden'); b.innerHTML = '';
    btns.forEach(x => {
      const btn = document.createElement('button');
      btn.textContent = x.text; btn.className = x.class || '';
      btn.onclick = () => { if(x.onclick) x.onclick(); closeModal(); };
      b.appendChild(btn);
    });
    document.getElementById('modal').classList.add('active');
  };
  window.closeModal = () => document.getElementById('modal').classList.remove('active');

  function generateCode() {
    const c = "BERMATCODE";
    return Array.from({length: 6}, () => c[Math.floor(Math.random() * c.length)]).join('');
  }

  // === CREAR SALA ===
  window.createRoom = async () => {
    myName = document.getElementById('name-create').value.trim();
    if (!myName) return showModal("Error", "Ingresa tu nombre.");
    
    showLoading("Creando sala", "Generando código único...");
    
    try {
      roomId = generateCode(); myPlayer = 1;
      await setDoc(doc(db, "games", roomId), {
        p1: myName, p2: null, board: Array(9).fill(""), turn: "p1", winner: null, winCells: null,
        status: "waiting", rematchReq: null, rematchStat: "none", reaction: null, created: serverTimestamp()
      });
      saveSession(roomId, myName, 1); closeModal();
      document.getElementById('room-code').textContent = roomId;
      showView('view-wait'); listenGame();
    } catch(e) { closeModal(); showModal("Error", "Fallo de conexión."); }
  };

  // === UNIRSE ===
  window.joinRoom = async () => {
    myName = document.getElementById('name-join').value.trim();
    const code = document.getElementById('code-join').value.trim().toUpperCase();
    if (!myName || !code || code.length !== 6) return showModal("Error", "Completa datos válidos.");
    
    showLoading("Uniéndote", "Conectando...");
    
    try {
      const snap = await getDoc(doc(db, "games", code));
      if (!snap.exists()) return closeModal(), showModal("Error", "Sala no encontrada.");
      const d = snap.data();
      if (d.p2) return closeModal(), showModal("Error", "Sala llena.");
      if (d.status !== "waiting") return closeModal(), showModal("Error", "No disponible.");
      roomId = code; myPlayer = 2;
      await updateDoc(doc(db, "games", roomId), { p2: myName, status: "playing" });
      saveSession(roomId, myName, 2); closeModal();
      showView('view-game'); listenGame();
    } catch(e) { closeModal(); showModal("Error", "No se pudo unir."); }
  };

  // === LISTENERS ===
  function listenGame() {
    if (unsub) unsub();
    unsub = onSnapshot(doc(db, "games", roomId), (snap) => {
      if (!snap.exists()) return;
      gameData = snap.data();
      
      if (gameData.p2) {
        document.getElementById('chat-container').classList.add('active');
        document.getElementById('reaction-container').classList.add('active');
      } else {
        document.getElementById('chat-container').classList.remove('active');
        document.getElementById('reaction-container').classList.remove('active');
      }

      if (gameData.status === "playing") {
        if (document.getElementById('view-wait').classList.contains('active')) showView('view-game');
      }

      document.getElementById('name-p1').textContent = gameData.p1;
      document.getElementById('name-p2').textContent = gameData.p2 || "Esperando...";
      document.getElementById('card-p1').className = 'player-card' + (myPlayer===1?' me':'');
      document.getElementById('card-p2').className = 'player-card' + (myPlayer===2?' me':'');
      
      renderBoard(); 
      updateReactionUI(gameData.reaction || null);
      
      if (gameData.rematchReq && gameData.rematchStat==="pending" && gameData.rematchReq!==myPlayer) {
        const n = gameData.rematchReq===1?gameData.p1:gameData.p2;
        showModal("Solicitud de revancha", `${n} quiere jugar otra vez.`, [
          {text:"Aceptar", class:"success", onclick:acceptRematch}, {text:"Rechazar", class:"danger", onclick:rejectRematch}
        ]);
      }
    });
    listenChat();
  }

  function listenChat() {
    if (chatUnsub) chatUnsub();
    const q = query(collection(db, "games", roomId, "chats"), orderBy("timestamp", "desc"));
    chatUnsub = onSnapshot(q, (snap) => {
      const el = document.getElementById('chat-messages');
      el.innerHTML = '';
      snap.forEach(ds => {
        const m = ds.data();
        const div = document.createElement('div');
        const isMe = m.sender === myPlayer;
        div.className = isMe ? 'msg me' : 'msg other';
        const t = m.timestamp ? new Date(m.timestamp.toMillis()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
        div.innerHTML = `<div class="msg-name">${m.name}</div><div>${m.text}</div><div class="msg-time">${t}</div>`;
        el.appendChild(div);
      });
      
      if (!isChatOpen && snap.docChanges().length > 0 && gameData) {
        const isNew = snap.docChanges().some(c => c.type==='added' && c.doc.data().sender !== myPlayer);
        if (isNew) { 
          unreadCount++; 
          document.getElementById('chat-badge').textContent = unreadCount>9?'9+':unreadCount; 
          document.getElementById('chat-badge').classList.remove('hidden'); 
        }
      }
    });
  }

  window.toggleChat = () => {
    isChatOpen = !isChatOpen;
    document.getElementById('chat-window').classList.toggle('active');
    if (isChatOpen) { unreadCount=0; document.getElementById('chat-badge').classList.add('hidden'); document.getElementById('chat-input').focus(); }
  };
  
  window.sendChatMessage = async () => {
    const inp = document.getElementById('chat-input');
    const txt = inp.value.trim();
    if (!txt || !roomId) return;
    
    try { 
      await addDoc(collection(db, "games", roomId, "chats"), { 
        text: txt, 
        sender: myPlayer, 
        name: myName, 
        timestamp: serverTimestamp() 
      }); 
      inp.value = ''; 
      setTimeout(() => {
        const el = document.getElementById('chat-messages');
        if(el) el.scrollTop = el.scrollHeight;
      }, 50);
    } catch(e) { showModal("Error", "No se pudo enviar."); }
  };
  
  document.getElementById('chat-input').addEventListener('keypress', e => { 
    if(e.key==='Enter') window.sendChatMessage(); 
  });

  // === TABLERO ===
  function renderBoard() {
    const b = document.getElementById('board'), st = document.getElementById('status'), rb = document.getElementById('btn-rematch');
    const isMyTurn = !gameData.winner && gameData.turn === (myPlayer===1?'p1':'p2');
    document.getElementById('card-p1').classList.remove('active');
    document.getElementById('card-p2').classList.remove('active');
    if(!gameData.winner) document.getElementById(gameData.turn==='p1'?'card-p1':'card-p2').classList.add('active');
    b.innerHTML = '';
    gameData.board.forEach((c,i) => {
      const d = document.createElement('div');
      d.className = 'cell' + (c?` ${c.toLowerCase()} taken`:'');
      if(gameData.winCells && gameData.winCells.includes(i)) d.classList.add('winner');
      d.textContent = c;
      if(!c && isMyTurn && !gameData.winner) d.onclick = () => makeMove(i);
      b.appendChild(d);
    });
    st.className = 'status';
    if(gameData.winner) {
      st.classList.add('finished');
      st.textContent = gameData.winner==='draw'?'Empate':(gameData.winner===(myPlayer===1?'p1':'p2')?'Ganaste':'Perdiste');
      rb.classList.remove('hidden');
    } else if(isMyTurn) {
      st.classList.add('my-turn'); st.textContent = 'Tu turno'; rb.classList.add('hidden');
    } else {
      st.classList.add('their-turn'); st.textContent = `Turno de ${myPlayer===1?gameData.p2:gameData.p1}`; rb.classList.add('hidden');
    }
  }
  
  window.makeMove = async (i) => {
    if(!gameData||gameData.board[i]||gameData.winner||gameData.turn!==(myPlayer===1?'p1':'p2')) return;
    const nb=[...gameData.board]; nb[i]=myPlayer===1?'X':'O';
    const w=checkWin(nb), draw=!w&&!nb.includes("");
    const up={board:nb};
    if(w) Object.assign(up,{winner:w,winCells:getCells(nb,w),status:"finished"});
    else if(draw) Object.assign(up,{winner:'draw',status:"finished"});
    else up.turn=myPlayer===1?'p2':'p1';
    try{await updateDoc(doc(db,"games",roomId),up);}catch(e){}
  };
  
  function checkWin(b){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let c of p)if(b[c[0]]&&b[c[0]]===b[c[1]]&&b[c[0]]===b[c[2]])return b[c[0]]==='X'?'p1':'p2';return null;}
  function getCells(b,w){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let c of p)if(b[c[0]]&&b[c[0]]===b[c[1]]&&b[c[0]]===b[c[2]])return c;return [];}

  // === REVANCHA ===
  window.requestRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{rematchReq:myPlayer,rematchStat:"pending"});showModal("Solicitud enviada","Esperando respuesta...");}catch(e){}};
  window.acceptRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{board:Array(9).fill(""),turn:"p1",winner:null,winCells:null,rematchReq:null,rematchStat:"none",status:"playing"});}catch(e){}};
  window.rejectRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{rematchReq:null,rematchStat:"rejected"});}catch(e){}};

  // === REACCIONES ===
  window.toggleEmojiPicker=()=>document.getElementById('emoji-picker').classList.toggle('active');
  window.sendReaction=async(em)=>{
    if(!gameData)return;
    const x=(window.innerWidth/2)-46, y=(window.innerHeight/2)-170;
    try{await updateDoc(doc(db,"games",roomId),{reaction:{emoji:em,sender:myName,x,y}});document.getElementById('emoji-picker').classList.remove('active');}catch(e){}
  };
  window.dismissReaction=async(e)=>{e.stopPropagation();if(gameData.reaction&&gameData.reaction.sender===myName)try{await updateDoc(doc(db,"games",roomId),{reaction:null});}catch(e){}};
  function updateReactionUI(r){
    const bub=document.getElementById('bubble');
    if(!r||!r.emoji){bub.style.display='none';return;}
    bub.style.display='flex';
    document.getElementById('b-emoji').textContent=r.emoji;
    document.getElementById('b-sender').textContent=r.sender;
    if(r.x!==undefined&&r.y!==undefined){bub.style.left=r.x+'px';bub.style.top=r.y+'px';}
    else{bub.style.left=(window.innerWidth/2-46)+'px';bub.style.top=(window.innerHeight/2-170)+'px';}
  }
  const bubble=document.getElementById('bubble');
  bubble.addEventListener('pointerdown',e=>{isDragging=true;bubble.setPointerCapture(e.pointerId);bubble.style.transition='none';});
  bubble.addEventListener('pointermove',e=>{
    if(!isDragging)return;e.preventDefault();
    let x=e.clientX-46, y=e.clientY-46;
    x=Math.max(0,Math.min(window.innerWidth-92,x));
    y=Math.max(0,Math.min(window.innerHeight-92,y));
    bubble.style.left=x+'px';bubble.style.top=y+'px';
  });
  bubble.addEventListener('pointerup',async e=>{
    if(!isDragging)return;isDragging=false;bubble.style.transition='transform 0.12s';bubble.releasePointerCapture(e.pointerId);
    if(gameData.reaction)try{await updateDoc(doc(db,"games",roomId),{"reaction.x":parseInt(bubble.style.left),"reaction.y":parseInt(bubble.style.top)});}catch(e){}
  });

  // === UTILIDADES ===
  window.copyCode=()=>navigator.clipboard.writeText(roomId).then(()=>showModal("Copiado","Envía el código a tu pareja."));
  window.leaveGame=async()=>{
    if(unsub)unsub();if(chatUnsub)chatUnsub();clearSession();
    if(myPlayer===1&&roomId)try{await deleteDoc(doc(db,"games",roomId));}catch(e){}
    document.getElementById('chat-container').classList.remove('active');
    document.getElementById('reaction-container').classList.remove('active');
    document.getElementById('emoji-picker').classList.remove('active');
    document.getElementById('chat-window').classList.remove('active');
    document.getElementById('bubble').style.display='none';
    document.getElementById('btn-rematch').classList.add('hidden');
    showView('view-menu');
    document.getElementById('name-create').value='';document.getElementById('name-join').value='';document.getElementById('code-join').value='';
    unreadCount=0;isChatOpen=false;
  };

  // === INIT ===
  (function init(){
    document.getElementById('board').innerHTML=Array(9).fill('<div class="cell"></div>').join('');
    if(loadSession()){showView('view-game');listenGame();}else{showView('view-menu');}
  })();
</script>
</body>
</html>
