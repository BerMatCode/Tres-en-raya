<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#667eea" />
  <meta name="msapplication-navbutton-color" content="#667eea" />
  <meta name="apple-mobile-web-app-status-bar-style" content="#667eea" />
  <title>Tres en Raya - BerMatCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --secondary: #764ba2;
      --success: #2ecc71;
      --danger: #e74c3c;
      --warning: #f39c12;
      --bg: #f8f9fc;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: var(--card);
      border-radius: 24px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 28px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .view { display: none; animation: fadeIn 0.4s ease; }
    .view.active { display: block; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    input {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      text-align: center;
      font-weight: 500;
      transition: all 0.3s;
      background: var(--bg);
    }
    
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
      background: white;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button.secondary {
      background: linear-gradient(135deg, #95a5a6, #7f8c8d);
      box-shadow: 0 4px 15px rgba(149, 165, 166, 0.3);
    }
    
    button.success {
      background: linear-gradient(135deg, var(--success), #27ae60);
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
    }
    
    button.danger {
      background: linear-gradient(135deg, var(--danger), #c0392b);
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
    }

    button::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }
    
    button:active::after {
      width: 300px;
      height: 300px;
    }

    .code-box {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 28px;
      border-radius: 18px;
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 8px;
      margin: 24px 0;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.35);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .players {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }
    
    .player-card {
      flex: 1;
      padding: 16px;
      border-radius: 14px;
      background: var(--bg);
      text-align: center;
      border: 3px solid transparent;
      transition: all 0.3s;
    }
    
    .player-card.active {
      border-color: var(--primary);
      background: linear-gradient(135deg, #f0f4ff, #e8eeff);
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    }
    
    .player-card.me {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    
    .player-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
    }
    
    .player-symbol {
      font-size: 24px;
      font-weight: 700;
    }

    .status {
      padding: 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      margin: 20px 0;
      transition: all 0.3s;
      background: var(--bg);
      color: var(--text-muted);
    }
    
    .status.my-turn {
      background: linear-gradient(135deg, var(--success), #27ae60);
      color: white;
      animation: pulse 2s infinite;
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
    }
    
    .status.their-turn {
      background: linear-gradient(135deg, var(--text-muted), #95a5a6);
      color: white;
    }
    
    .status.finished {
      background: linear-gradient(135deg, var(--danger), #c0392b);
      color: white;
      animation: shake 0.5s;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 24px auto;
      max-width: 320px;
    }
    
    .cell {
      aspect-ratio: 1;
      background: var(--bg);
      border: 3px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 40px;
      font-weight: 700;
      position: relative;
      overflow: hidden;
    }
    
    .cell:hover:not(.taken) {
      background: #eef1ff;
      border-color: var(--primary);
      transform: scale(1.05);
    }
    
    .cell.x {
      color: var(--danger);
      background: linear-gradient(135deg, #ffeaea, #ffd6d6);
      border-color: var(--danger);
    }
    
    .cell.o {
      color: var(--primary);
      background: linear-gradient(135deg, #eaf4ff, #d6e8ff);
      border-color: var(--primary);
    }
    
    .cell.taken {
      cursor: default;
    }
    
    .cell.winner {
      background: linear-gradient(135deg, var(--success), #27ae60);
      color: white;
      border-color: var(--success);
      animation: winPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
    }
    
    @keyframes winPop {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .credits {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: white;
      text-align: center;
      padding: 24px;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    /* MODALES */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    
    .modal.active {
      opacity: 1;
      pointer-events: all;
    }
    
    .modal-content {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transform: scale(0.8) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .modal.active .modal-content {
      transform: scale(1) translateY(0);
    }
    
    .modal-loader {
      width: 60px;
      height: 60px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      margin: 0 auto 24px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }
    
    .modal-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    .modal-buttons button {
      flex: 1;
      margin: 0;
    }

    .hidden { display: none !important; }
    
    .text-center { text-align: center; }
    .mt-12 { margin-top: 12px; }
    .mb-12 { margin-bottom: 12px; }

    @media (max-width: 480px) {
      .container { padding: 28px 20px; border-radius: 20px; }
      h1 { font-size: 1.7rem; }
      .code-box { font-size: 28px; letter-spacing: 6px; padding: 24px; }
      .board { gap: 10px; max-width: 280px; }
      .cell { border-radius: 12px; font-size: 36px; }
      .credits { font-size: 16px; padding: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Tres en Raya</h1>

  <!-- MENU -->
  <div id="view-menu" class="view active">
    <button onclick="showView('view-create')">Crear Sala Nueva</button>
    <button onclick="showView('view-join')" class="secondary">Unirse a Sala</button>
  </div>

  <!-- CREAR -->
  <div id="view-create" class="view">
    <input type="text" id="name-create" placeholder="Tu nombre" maxlength="12">
    <button onclick="createRoom()">Generar Código de Sala</button>
    <button onclick="showView('view-menu')" class="secondary">Volver al Menú</button>
  </div>

  <!-- ESPERANDO -->
  <div id="view-waiting" class="view">
    <p class="text-center mb-12" style="color: var(--text-muted); font-size: 15px;">Comparte este código con tu oponente:</p>
    <div id="room-code" class="code-box">------</div>
    <button onclick="copyCode()">Copiar Código</button>
    <p class="text-center mt-12" style="color: var(--text-muted); font-size: 14px;">Esperando a que se una el segundo jugador...</p>
    <button onclick="leaveGame()" class="secondary mt-12">Cancelar y Salir</button>
  </div>

  <!-- UNIRSE -->
  <div id="view-join" class="view">
    <input type="text" id="name-join" placeholder="Tu nombre" maxlength="12">
    <input type="text" id="code-join" placeholder="Código de 6 letras" maxlength="6" style="text-transform:uppercase; letter-spacing: 2px;">
    <button onclick="joinRoom()">Unirse a la Sala</button>
    <button onclick="showView('view-menu')" class="secondary">Volver al Menú</button>
  </div>

  <!-- JUEGO -->
  <div id="view-game" class="view">
    <div class="players">
      <div id="card-p1" class="player-card">
        <div class="player-name" id="name-p1">Jugador 1</div>
        <div class="player-symbol">X</div>
      </div>
      <div id="card-p2" class="player-card">
        <div class="player-name" id="name-p2">Jugador 2</div>
        <div class="player-symbol">O</div>
      </div>
    </div>

    <div id="status" class="status">Conectando...</div>
    <div id="board" class="board"></div>

    <button id="btn-rematch" onclick="requestRematch()" class="hidden success">Solicitar Revancha</button>
    <button onclick="leaveGame()" class="secondary">Salir de la Partida</button>
  </div>
</div>

<div class="credits">BerMatCode</div>

<!-- MODAL GENERICO -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div id="modal-loader" class="modal-loader hidden"></div>
    <div id="modal-title" class="modal-title">Título</div>
    <div id="modal-text" class="modal-text">Mensaje</div>
    <div id="modal-buttons" class="modal-buttons">
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-MIB8DbCF3YDAqb2qGRO6sjgUzg-sb-I",
    authDomain: "tres-en-raya1.firebaseapp.com",
    projectId: "tres-en-raya1",
    storageBucket: "tres-en-raya1.firebasestorage.app",
    messagingSenderId: "728066446875",
    appId: "1:728066446875:web:d80726479234f1cf580abe",
    measurementId: "G-P41C6EYSRT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let roomId = null;
  let myName = "";
  let myPlayer = null;
  let mySymbol = null;
  let gameData = null;
  let unsubscribe = null;

  // NAVEGACION
  window.showView = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };

  // MODAL CON LOADER
  window.showLoadingModal = (title, text) => {
    document.getElementById('modal-loader').classList.remove('hidden');
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal-buttons').classList.add('hidden');
    document.getElementById('modal').classList.add('active');
  };

  window.showModal = (title, text, buttons = [{text: 'Cerrar', onclick: closeModal}]) => {
    document.getElementById('modal-loader').classList.add('hidden');
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    const btnContainer = document.getElementById('modal-buttons');
    btnContainer.classList.remove('hidden');
    btnContainer.innerHTML = '';
    buttons.forEach(btn => {
      const b = document.createElement('button');
      b.textContent = btn.text;
      b.className = btn.class || '';
      b.onclick = btn.onclick;
      btnContainer.appendChild(b);
    });
    document.getElementById('modal').classList.add('active');
  };

  window.closeModal = () => {
    document.getElementById('modal').classList.remove('active');
  };

  // GENERAR CODIGO SOLO CON BERMATCODE
  function generateCode() {
    const chars = "BERMATCODE";
    return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  }

  // CREAR SALA
  window.createRoom = async () => {
    myName = document.getElementById('name-create').value.trim();
    if (!myName) {
      return showModal("Error", "Por favor ingresa tu nombre para continuar.");
    }

    // Mostrar modal de carga por 1 segundo
    showLoadingModal("Creando sala", "Generando código único y preparando la partida...");
    
    setTimeout(async () => {
      roomId = generateCode();
      myPlayer = 1;
      mySymbol = 'X';

      try {
        await setDoc(doc(db, "games", roomId), {
          player1: myName,
          player2: null,
          board: ["", "", "", "", "", "", "", "", ""],
          turn: "player1",
          winner: null,
          winningCells: null,
          status: "waiting",
          rematchRequestedBy: null,
          rematchStatus: "none",
          createdAt: serverTimestamp()
        });

        closeModal();
        document.getElementById('room-code').textContent = roomId;
        showView('view-waiting');

        unsubscribe = onSnapshot(doc(db, "games", roomId), (snap) => {
          if (snap.exists()) {
            const data = snap.data();
            if (data.player2 && data.status === "playing") {
              startGame(data);
            }
          }
        });
      } catch (error) {
        closeModal();
        showModal("Error de conexión", "No se pudo crear la sala. Verifica tu conexión e intenta de nuevo.");
        console.error(error);
      }
    }, 1000);
  };

  // UNIRSE A SALA
  window.joinRoom = async () => {
    myName = document.getElementById('name-join').value.trim();
    const code = document.getElementById('code-join').value.trim().toUpperCase();

    if (!myName || !code || code.length !== 6) {
      return showModal("Datos incompletos", "Por favor ingresa tu nombre y un código válido de 6 letras.");
    }

    // Mostrar modal de carga por 1 segundo
    showLoadingModal("Uniéndote a la sala", "Conectando con la partida...");
    
    setTimeout(async () => {
      try {
        const snap = await getDoc(doc(db, "games", code));
        
        if (!snap.exists()) {
          closeModal();
          return showModal("Sala no encontrada", "El código no existe o ya fue eliminado. Verifica e intenta de nuevo.");
        }

        const data = snap.data();
        
        if (data.player2) {
          closeModal();
          return showModal("Sala llena", "Esta sala ya tiene dos jugadores. Pide otro código o crea una nueva sala.");
        }
        
        if (data.status !== "waiting") {
          closeModal();
          return showModal("No disponible", "La partida ya comenzó o terminó. Busca otra sala.");
        }

        roomId = code;
        myPlayer = 2;
        mySymbol = 'O';

        await updateDoc(doc(db, "games", roomId), {
          player2: myName,
          status: "playing",
          joinedAt: serverTimestamp()
        });

        closeModal();
        
        unsubscribe = onSnapshot(doc(db, "games", roomId), (snap) => {
          if (snap.exists()) {
            startGame(snap.data());
          }
        });
      } catch (error) {
        closeModal();
        showModal("Error de conexión", "No se pudo unir a la sala. Verifica tu conexión e intenta de nuevo.");
        console.error(error);
      }
    }, 1000);
  };

  // INICIAR JUEGO
  function startGame(data) {
    showView('view-game');
    gameData = data;

    const isP1 = myPlayer === 1;
    document.getElementById('name-p1').textContent = data.player1;
    document.getElementById('name-p2').textContent = data.player2 || "Esperando...";

    document.getElementById('card-p1').className = 'player-card' + (isP1 ? ' me' : '');
    document.getElementById('card-p2').className = 'player-card' + (!isP1 ? ' me' : '');

    unsubscribe = onSnapshot(doc(db, "games", roomId), (snap) => {
      if (snap.exists()) {
        gameData = snap.data();
        updateUI();
      }
    });
  }

  // ACTUALIZAR UI
  function updateUI() {
    if (!gameData) return;

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const rematchBtn = document.getElementById('btn-rematch');
    
    const isMyTurn = gameData.turn === `player${myPlayer}` && !gameData.winner;
    
    document.getElementById('card-p1').classList.remove('active');
    document.getElementById('card-p2').classList.remove('active');
    
    if (!gameData.winner) {
      document.getElementById(gameData.turn === 'player1' ? 'card-p1' : 'card-p2').classList.add('active');
    }

    boardEl.innerHTML = '';
    gameData.board.forEach((cell, idx) => {
      const div = document.createElement('div');
      div.className = 'cell' + (cell ? ` ${cell.toLowerCase()} taken` : '');
      
      if (gameData.winningCells && gameData.winningCells.includes(idx)) {
        div.classList.add('winner');
      }
      
      div.textContent = cell;
      
      if (!cell && isMyTurn && !gameData.winner) {
        div.onclick = () => makeMove(idx);
      }
      
      boardEl.appendChild(div);
    });

    statusEl.className = 'status';
    if (gameData.winner) {
      statusEl.classList.add('finished');
      if (gameData.winner === 'draw') {
        statusEl.textContent = '¡Empate!';
      } else if (gameData.winner === `player${myPlayer}`) {
        statusEl.textContent = '🎉 ¡Ganaste!';
      } else {
        statusEl.textContent = 'Has perdido';
      }
      rematchBtn.classList.remove('hidden');
    } else if (isMyTurn) {
      statusEl.classList.add('my-turn');
      statusEl.textContent = '✓ Es tu turno';
      rematchBtn.classList.add('hidden');
    } else {
      statusEl.classList.add('their-turn');
      statusEl.textContent = `Turno de ${myPlayer === 1 ? gameData.player2 : gameData.player1}`;
      rematchBtn.classList.add('hidden');
    }

    if (gameData.rematchRequestedBy && gameData.rematchStatus === 'pending') {
      const requester = gameData.rematchRequestedBy === 1 ? gameData.player1 : gameData.player2;
      if (gameData.rematchRequestedBy !== myPlayer) {
        showModal("Solicitud de revancha", `${requester} quiere jugar otra partida. ¿Aceptas?`, [
          { text: "Aceptar", onclick: acceptRematch, class: "success" },
          { text: "Rechazar", onclick: rejectRematch, class: "danger" }
        ]);
      }
    }
  }

  // HACER MOVIMIENTO
  window.makeMove = async (idx) => {
    if (!gameData || gameData.board[idx] || gameData.winner || gameData.turn !== `player${myPlayer}`) {
      return;
    }

    const newBoard = [...gameData.board];
    newBoard[idx] = mySymbol;

    const winner = checkWinner(newBoard);
    const isDraw = !winner && !newBoard.includes("");

    const updateData = { board: newBoard };

    if (winner) {
      updateData.winner = winner;
      updateData.winningCells = getWinningCells(newBoard, winner);
      updateData.status = "finished";
    } else if (isDraw) {
      updateData.winner = 'draw';
      updateData.status = "finished";
    } else {
      updateData.turn = myPlayer === 1 ? 'player2' : 'player1';
    }

    try {
      await updateDoc(doc(db, "games", roomId), updateData);
    } catch (error) {
      console.error("Error:", error);
    }
  };

  function checkWinner(board) {
    const wins = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];
    
    for (const [a, b, c] of wins) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return board[a] === 'X' ? 'player1' : 'player2';
      }
    }
    return null;
  }

  function getWinningCells(board, winner) {
    const wins = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];
    
    for (const [a, b, c] of wins) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return [a, b, c];
      }
    }
    return [];
  }

  // REVANCHA
  window.requestRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), {
        rematchRequestedBy: myPlayer,
        rematchStatus: "pending"
      });
      showModal("Solicitud enviada", "Esperando respuesta del oponente...");
    } catch (error) {
      console.error(error);
    }
  };

  window.acceptRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), {
        board: ["", "", "", "", "", "", "", "", ""],
        turn: "player1",
        winner: null,
        winningCells: null,
        rematchRequestedBy: null,
        rematchStatus: "none",
        status: "playing"
      });
      closeModal();
    } catch (error) {
      console.error(error);
    }
  };

  window.rejectRematch = async () => {
    try {
      await updateDoc(doc(db, "games", roomId), {
        rematchRequestedBy: null,
        rematchStatus: "rejected"
      });
      closeModal();
    } catch (error) {
      console.error(error);
    }
  };

  // COPIAR Y SALIR
  window.copyCode = () => {
    navigator.clipboard.writeText(roomId).then(() => {
      showModal("¡Copiado!", "El código se ha copiado al portapapeles. Compártelo con tu oponente.");
    }).catch(() => {
      showModal("Error", "No se pudo copiar automáticamente. Cópialo manualmente del cuadro.");
    });
  };

  window.leaveGame = async () => {
    if (unsubscribe) unsubscribe();
    if (roomId && myPlayer === 1) {
      try { await deleteDoc(doc(db, "games", roomId)); } catch(e) {}
    }
    roomId = null;
    myName = "";
    myPlayer = null;
    gameData = null;
    document.getElementById('btn-rematch').classList.add('hidden');
    showView('view-menu');
    document.getElementById('name-create').value = '';
    document.getElementById('name-join').value = '';
    document.getElementById('code-join').value = '';
  };

  // Inicializar tablero
  document.getElementById('board').innerHTML = Array(9).fill('<div class="cell"></div>').join('');
</script>
</body>
</html>
