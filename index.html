<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tres en Raya - BerMatCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --success: #2ecc71;
      --danger: #e74c3c;
      --bg: #f8f9fc;
      --text: #1a1a2e;
      --text-muted: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
    
    html, body {
      height: 100vh; width: 100vw;
      overflow: hidden; /* Bloquea el scroll completamente */
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .app-wrapper {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative;
    }

    .container {
      background: white;
      width: 90%; max-width: 360px; /* Más compacto */
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: relative;
      z-index: 10;
      text-align: center;
    }

    h1 {
      color: var(--primary); font-size: 1.6rem; font-weight: 800; margin-bottom: 20px;
    }

    .view { display: none; animation: fade 0.3s ease; }
    .view.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* Inputs más elegantes y no tan largos */
    input {
      width: 100%; padding: 12px; margin: 10px 0;
      border: 2px solid #eee; border-radius: 12px;
      font-size: 16px; text-align: center; outline: none;
      transition: 0.3s;
    }
    input:focus { border-color: var(--primary); }

    button {
      width: 100%; padding: 14px; margin: 8px 0;
      border: none; border-radius: 12px;
      background: var(--primary); color: white;
      font-weight: 600; font-size: 15px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    button.secondary { background: #95a5a6; box-shadow: none; }
    button:active { transform: scale(0.98); }

    .code-box {
      background: var(--bg); padding: 15px; border-radius: 10px;
      font-size: 24px; font-weight: bold; letter-spacing: 4px; color: var(--primary);
      margin: 15px 0; border: 2px dashed var(--primary);
    }

    .players { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
    .p-card {
      flex: 1; padding: 10px; border-radius: 10px; background: var(--bg);
      font-size: 12px; font-weight: 600; transition: 0.3s;
    }
    .p-card.active { background: var(--primary); color: white; transform: scale(1.05); }
    .p-card.me { border: 2px solid var(--primary); }

    .status-bar {
      padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600;
      margin-bottom: 15px; background: var(--bg); color: var(--text-muted);
    }
    .status-bar.my-turn { background: var(--success); color: white; animation: pulse 2s infinite; }
    .status-bar.their-turn { background: var(--text-muted); color: white; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

    .board {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      max-width: 260px; margin: 0 auto 15px;
    }
    .cell {
      aspect-ratio: 1; background: var(--bg); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800; color: var(--text);
      cursor: pointer; transition: 0.2s;
    }
    .cell:hover:not(.taken) { background: #eef1ff; }
    .cell.x { color: var(--danger); }
    .cell.o { color: var(--primary); }
    .cell.taken { cursor: default; }
    .cell.winner { background: var(--success); color: white; transform: scale(1.05); }

    /* BURBUJA DE REACCIÓN (ARRASTRABLE) */
    .reaction-bubble {
      position: absolute;
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      cursor: grab; z-index: 100;
      border: 2px solid var(--primary);
      touch-action: none; /* Crucial para arrastrar en móvil */
      transition: transform 0.1s;
    }
    .reaction-bubble:active { cursor: grabbing; transform: scale(1.1); }
    .reaction-emoji { font-size: 32px; }
    .reaction-name { font-size: 10px; font-weight: bold; color: var(--primary); margin-top: 2px; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .btn-dismiss {
      position: absolute; top: -5px; right: -5px;
      width: 20px; height: 20px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid white;
    }

    .emoji-picker {
      position: absolute; bottom: 20px; right: 20px;
      background: white; padding: 10px; border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      display: none; grid-template-columns: repeat(3, 1fr); gap: 5px;
      z-index: 90;
    }
    .emoji-picker.active { display: grid; }
    .emo-btn {
      width: 36px; height: 36px; border: none; background: var(--bg);
      border-radius: 8px; font-size: 20px; cursor: pointer;
    }

    .credits {
      font-family: 'Pacifico', cursive;
      color: white; font-size: 18px; margin-top: 15px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .hidden { display: none !important; }

    /* Modal simple */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 200;
      display: none; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-box {
      background: white; padding: 20px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center;
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="container">
      <h1>Tres en Raya</h1>

      <!-- MENÚ -->
      <div id="v-menu" class="view active">
        <button onclick="showView('v-create')">Crear Sala</button>
        <button onclick="showView('v-join')" class="secondary">Unirse a Sala</button>
      </div>

      <!-- CREAR -->
      <div id="v-create" class="view">
        <input type="text" id="in-name-1" placeholder="Tu nombre" maxlength="10">
        <button onclick="createRoom()">Generar Sala</button>
        <button onclick="showView('v-menu')" class="secondary">Volver</button>
      </div>

      <!-- ESPERA -->
      <div id="v-wait" class="view">
        <p style="color:var(--text-muted); margin-bottom:10px">Código de Sala:</p>
        <div id="disp-code" class="code-box">...</div>
        <button onclick="copyCode()">Copiar</button>
        <p style="font-size:12px; color:#888; margin:15px 0">Esperando oponente...</p>
        <button onclick="leaveGame()" class="secondary">Salir</button>
      </div>

      <!-- UNIRSE -->
      <div id="v-join" class="view">
        <input type="text" id="in-name-2" placeholder="Tu nombre" maxlength="10">
        <input type="text" id="in-code" placeholder="Código" maxlength="6" style="text-transform:uppercase">
        <button onclick="joinRoom()">Entrar</button>
        <button onclick="showView('v-menu')" class="secondary">Volver</button>
      </div>

      <!-- JUEGO -->
      <div id="v-game" class="view">
        <div class="players">
          <div id="card-p1" class="p-card">J1: <span id="n-p1">?</span></div>
          <div id="card-p2" class="p-card">J2: <span id="n-p2">?</span></div>
        </div>
        <div id="status" class="status-bar">Conectando...</div>
        <div id="board" class="board"></div>
        <button id="btn-rematch" onclick="requestRematch()" class="hidden" style="background:var(--danger)">Revancha</button>
        <button onclick="leaveGame()" class="secondary">Salir</button>
      </div>
    </div>

    <!-- REACCIÓN FLOTANTE (ARRASTRABLE) -->
    <div id="bubble" class="reaction-bubble" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
      <div class="btn-dismiss" onclick="dismissReaction(event)">✕</div>
      <div class="reaction-emoji" id="b-emoji"></div>
      <div class="reaction-name" id="b-name"></div>
    </div>

    <!-- PICKER DE EMOJIS -->
    <div class="emoji-picker" id="picker">
      <button class="emo-btn" onclick="sendReact('❤️')">❤️</button>
      <button class="emo-btn" onclick="sendReact('😂')">😂</button>
      <button class="emo-btn" onclick="sendReact('😖')">😖</button>
      <button class="emo-btn" onclick="sendReact('😡')">😡</button>
      <button class="emo-btn" onclick="sendReact('😭')">😭</button>
      <button class="emo-btn" onclick="sendReact('😲')">😲</button>
      <button class="emo-btn" onclick="sendReact('😁')">😁</button>
      <button class="emo-btn" onclick="sendReact('🥰')"></button>
      <button class="emo-btn" onclick="sendReact('😍')">😍</button>
    </div>
    
    <!-- BOTÓN PARA ABRIR PICKER -->
    <button id="btn-picker-toggle" onclick="togglePicker()" style="width:50px; height:50px; border-radius:50%; position:fixed; bottom:20px; right:20px; padding:0; font-size:24px; display:none; z-index:95;">💬</button>

    <div class="credits">BerMatCode</div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <h3 id="m-title" style="margin-bottom:10px"></h3>
      <p id="m-text" style="margin-bottom:15px; color:#666"></p>
      <div id="m-btns"></div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-MIB8DbCF3YDAqb2qGRO6sjgUzg-sb-I",
    authDomain: "tres-en-raya1.firebaseapp.com",
    projectId: "tres-en-raya1",
    storageBucket: "tres-en-raya1.firebasestorage.app",
    messagingSenderId: "728066446875",
    appId: "1:728066446875:web:d80726479234f1cf580abe",
    measurementId: "G-P41C6EYSRT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let roomId = null, myName = "", myPlayer = 1, game = null, unsub = null;

  // SISTEMA DE PERSISTENCIA (NO SE PIERDE LA SALA)
  function saveSession(id, name, p) {
    localStorage.setItem('game_room', id);
    localStorage.setItem('game_name', name);
    localStorage.setItem('game_p', p);
  }
  function loadSession() {
    const id = localStorage.getItem('game_room');
    if (id) {
      myName = localStorage.getItem('game_name');
      myPlayer = parseInt(localStorage.getItem('game_p'));
      roomId = id;
      reconnectGame();
      return true;
    }
    return false;
  }
  function clearSession() {
    localStorage.removeItem('game_room');
    localStorage.removeItem('game_name');
    localStorage.removeItem('game_p');
  }

  // Si hay sesión guardada, entrar directo
  if (!loadSession()) {
    showView('v-menu');
  }

  // VISTAS
  window.showView = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };

  // MODAL
  function showModal(title, text, btns = [{text:'OK', class:''}]) {
    document.getElementById('m-title').textContent = title;
    document.getElementById('m-text').textContent = text;
    const cont = document.getElementById('m-btns');
    cont.innerHTML = '';
    btns.forEach(b => {
      const btn = document.createElement('button');
      btn.textContent = b.text; btn.className = b.class;
      btn.onclick = () => document.getElementById('modal').classList.remove('active');
      cont.appendChild(btn);
    });
    document.getElementById('modal').classList.add('active');
  }

  // CREAR
  window.createRoom = async () => {
    myName = document.getElementById('in-name-1').value.trim() || 'Jugador 1';
    roomId = Math.random().toString(36).substring(2, 8).toUpperCase(); // Genera letras y números
    
    await setDoc(doc(db, "games", roomId), {
      p1: myName, p2: null,
      board: Array(9).fill(""), turn: "p1", win: null,
      rematch: false, reaction: null, created: serverTimestamp()
    });
    
    saveSession(roomId, myName, 1);
    document.getElementById('disp-code').textContent = roomId;
    showView('v-wait');
    listenGame();
  };

  // UNIRSE
  window.joinRoom = async () => {
    myName = document.getElementById('in-name-2').value.trim() || 'Jugador 2';
    roomId = document.getElementById('in-code').value.trim().toUpperCase();
    
    const d = (await getDoc(doc(db, "games", roomId))).data();
    if (!d) return showModal("Error", "Sala no existe");
    if (d.p2) return showModal("Error", "Sala llena");

    await updateDoc(doc(db, "games", roomId), { p2: myName });
    saveSession(roomId, myName, 2);
    showView('v-game');
    listenGame();
  };

  // CONECTAR (Reconectar si se cierra la app)
  function reconnectGame() {
    showView('v-game');
    listenGame();
  }

  // ESCUCHAR JUEGO
  function listenGame() {
    unsub = onSnapshot(doc(db, "games", roomId), (snap) => {
      if (!snap.exists()) return;
      game = snap.data();
      
      // UI
      document.getElementById('n-p1').textContent = game.p1;
      document.getElementById('n-p2').textContent = game.p2 || "...";
      
      const isMe1 = (myPlayer === 1);
      document.getElementById('card-p1').className = 'p-card' + (isMe1 ? ' me' : '');
      document.getElementById('card-p2').className = 'p-card' + (!isMe1 ? ' me' : '');
      
      if (game.p2) {
        if (document.getElementById('v-wait').classList.contains('active')) showView('v-game');
        renderBoard();
      }

      // Reacciones
      updateReaction(game.reaction);
      
      // Rematch
      if (game.rematch && game.rematchBy !== myPlayer) {
         showModal("Revancha", `${game.rematchBy === 1 ? game.p1 : game.p2} quiere jugar otra vez.`, [
           {text:"Aceptar", class:"btn-success", onclick: () => { acceptRematch(); document.getElementById('modal').classList.remove('active'); }},
           {text:"No", class:"btn-secondary", onclick: () => document.getElementById('modal').classList.remove('active')}
         ]);
      }
    });
  }

  function renderBoard() {
    const b = document.getElementById('board');
    b.innerHTML = '';
    const isMyTurn = !game.win && game.turn === (myPlayer===1 ? 'p1' : 'p2');
    
    game.board.forEach((c, i) => {
      const d = document.createElement('div');
      d.className = `cell ${c ? c.toLowerCase()+' taken' : ''} ${game.winCells && game.winCells.includes(i) ? 'winner' : ''}`;
      d.textContent = c;
      if (isMyTurn && !c) d.onclick = () => move(i);
      b.appendChild(d);
    });

    const st = document.getElementById('status');
    if (game.win) {
      st.textContent = game.win === 'draw' ? "¡Empate!" : (game.win === (myPlayer===1?'p1':'p2') ? "¡Ganaste!" : "Perdiste");
      st.className = 'status-bar ' + (game.win === 'draw' ? '' : (game.win === (myPlayer===1?'p1':'p2') ? 'my-turn' : 'their-turn'));
      document.getElementById('btn-rematch').classList.remove('hidden');
      document.getElementById('btn-picker-toggle').style.display = 'block';
    } else if (isMyTurn) {
      st.textContent = "Tu turno"; st.className = 'status-bar my-turn';
      document.getElementById('btn-rematch').classList.add('hidden');
    } else {
      st.textContent = `Turno de ${myPlayer===1?game.p2:game.p1}`; st.className = 'status-bar their-turn';
      document.getElementById('btn-rematch').classList.add('hidden');
    }
  }

  window.move = async (i) => {
    if (!game || game.board[i] || game.win) return;
    const nb = [...game.board]; nb[i] = myPlayer===1?'X':'O';
    const w = checkWin(nb);
    await updateDoc(doc(db, "games", roomId), {
      board: nb, turn: myPlayer===1?'p2':'p1',
      win: w ? w : (nb.join('') ? 'draw' : null),
      winCells: w ? getCells(nb) : null
    });
  };

  function checkWin(b) {
    const p = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let c of p) if(b[c[0]] && b[c[0]]===b[c[1]] && b[c[0]]===b[c[2]]) return b[c[0]]==='X'?'p1':'p2';
    return null;
  }
  function getCells(b) {
    const p = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let c of p) if(b[c[0]] && b[c[0]]===b[c[1]] && b[c[0]]===b[c[2]]) return c;
    return [];
  }

  // REVANCHA
  window.requestRematch = () => updateDoc(doc(db, "games", roomId), { rematch: true, rematchBy: myPlayer, board: Array(9).fill(""), win: null, turn: "p1" });
  window.acceptRematch = () => updateDoc(doc(db, "games", roomId), { rematch: false, rematchBy: null });

  // SALIR
  window.leaveGame = () => {
    if (unsub) unsub();
    clearSession();
    if (myPlayer === 1 && roomId) deleteDoc(doc(db, "games", roomId));
    location.reload();
  };

  // REACCIONES (LÓGICA DE ARRASTRAR)
  let isDragging = false, curX = 0, curY = 0, initX = 0, initY = 0;
  const bubble = document.getElementById('bubble');

  function updateReaction(r) {
    if (!r || !r.emoji) { bubble.style.display = 'none'; return; }
    bubble.style.display = 'flex';
    document.getElementById('b-emoji').textContent = r.emoji;
    document.getElementById('b-name').textContent = r.name;
    
    // Posicionar si hay coordenadas guardadas
    if (r.x && r.y) {
      bubble.style.left = r.x + 'px';
      bubble.style.top = r.y + 'px';
    } else {
      // Posición por defecto centrada
      bubble.style.left = (window.innerWidth / 2 - 40) + 'px';
      bubble.style.top = (window.innerHeight / 2 - 40) + 'px';
    }
  }

  window.togglePicker = () => document.getElementById('picker').classList.toggle('active');
  
  window.sendReact = async (emoji) => {
    const x = (window.innerWidth / 2 - 40);
    const y = (window.innerHeight / 2 - 150);
    await updateDoc(doc(db, "games", roomId), {
      reaction: { emoji, name: myName, x, y }
    });
    document.getElementById('picker').classList.remove('active');
  };

  window.dismissReaction = (e) => {
    e.stopPropagation();
    if (game.reaction && game.reaction.name === myName) {
      updateDoc(doc(db, "games", roomId), { reaction: null });
    }
  };

  // SISTEMA DRAG AND DROP (Mouse & Touch)
  window.startDrag = (e) => {
    if (game.reaction && game.reaction.name !== myName) return; // Solo el creador de la reacción la mueve
    isDragging = true;
    const ev = e.type === 'touchstart' ? e.touches[0] : e;
    initX = ev.clientX - (parseInt(bubble.style.left) || 0);
    initY = ev.clientY - (parseInt(bubble.style.top) || 0);
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('touchmove', onDrag, {passive: false});
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchend', endDrag);
  };

  function onDrag(e) {
    if (!isDragging) return;
    e.preventDefault(); // Evita scroll
    const ev = e.type === 'touchmove' ? e.touches[0] : e;
    curX = ev.clientX - initX;
    curY = ev.clientY - initY;
    bubble.style.left = curX + 'px';
    bubble.style.top = curY + 'px';
  }

  window.endDrag = async () => {
    if (!isDragging) return;
    isDragging = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('mouseup', endDrag);
    document.removeEventListener('touchend', endDrag);
    
    // Guardar posición final en Firebase
    if (game.reaction && game.reaction.name === myName) {
      await updateDoc(doc(db, "games", roomId), {
        "reaction.x": curX,
        "reaction.y": curY
      });
    }
  };

  window.copyCode = () => {
    navigator.clipboard.writeText(roomId);
    showModal("Copiado", "Envía el código a tu novia.");
  };

  // Inicializar tablero vacío
  document.getElementById('board').innerHTML = Array(9).fill('<div class="cell"></div>').join('');
</script>
</body>
</html>
