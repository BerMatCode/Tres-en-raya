<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-status-bar-style" content="#667eea" />
  <title>Tres en Raya - BerMatCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --secondary: #764ba2;
      --success: #2ecc71;
      --danger: #e74c3c;
      --bg: #f8f9fc;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      height: 100dvh; width: 100vw;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .app-container {
      background: var(--card);
      border-radius: 24px;
      padding: 28px 22px;
      max-width: 380px; width: 92%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
    }

    h1 { text-align: center; color: var(--primary); margin-bottom: 24px; font-size: 1.8rem; font-weight: 700; }

    .view { display: none; width: 100%; animation: slideIn 0.3s ease; }
    .view.active { display: block; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    input {
      width: 100%; padding: 14px; margin: 10px 0;
      border: 2px solid var(--border); border-radius: 14px;
      font-size: 16px; text-align: center; font-weight: 500;
      transition: all 0.3s; background: var(--bg);
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15); background: white; }

    button {
      width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; position: relative; overflow: hidden;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(102, 126, 234, 0.4); }
    button:active { transform: translateY(0); }
    button.secondary { background: linear-gradient(135deg, #95a5a6, #7f8c8d); box-shadow: 0 4px 12px rgba(149, 165, 166, 0.3); }
    button.success { background: linear-gradient(135deg, var(--success), #27ae60); box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); }
    button.danger { background: linear-gradient(135deg, var(--danger), #c0392b); box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .code-box {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; padding: 22px; border-radius: 16px;
      text-align: center; font-size: 26px; font-weight: 700;
      letter-spacing: 5px; margin: 18px 0; box-shadow: 0 6px 20px rgba(102, 126, 234, 0.35);
    }

    .players { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 16px; width: 100%; }
    .player-card {
      flex: 1; padding: 12px; border-radius: 12px; background: var(--bg);
      text-align: center; border: 2px solid transparent; transition: all 0.3s;
    }
    .player-card.active { border-color: var(--primary); background: #f0f4ff; transform: scale(1.03); }
    .player-card.me { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .player-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .player-symbol { font-size: 18px; font-weight: 700; }

    .status {
      padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; font-size: 14px;
      margin: 14px 0; width: 100%; transition: all 0.3s; background: var(--bg); color: var(--text-muted);
    }
    .status.my-turn { background: linear-gradient(135deg, var(--success), #27ae60); color: white; animation: pulse 2s infinite; }
    .status.their-turn { background: linear-gradient(135deg, var(--text-muted), #95a5a6); color: white; }
    .status.finished { background: linear-gradient(135deg, var(--danger), #c0392b); color: white; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }

    .board {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin: 16px auto; width: 100%; max-width: 260px;
    }
    .cell {
      aspect-ratio: 1; background: var(--bg); border: 3px solid var(--border); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 34px; font-weight: 700;
    }
    .cell:hover:not(.taken) { background: #eef1ff; border-color: var(--primary); transform: scale(1.03); }
    .cell.x { color: var(--danger); background: #ffeaea; border-color: var(--danger); }
    .cell.o { color: var(--primary); background: #eaf4ff; border-color: var(--primary); }
    .cell.taken { cursor: default; }
    .cell.winner { background: linear-gradient(135deg, var(--success), #27ae60); color: white; border-color: var(--success); animation: winPop 0.4s; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
    @keyframes winPop { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    /* BOTONES FLOTANTES SEPARADOS */
    .btn-chat-wrap { position: fixed; bottom: 25px; right: 25px; z-index: 90; }
    .btn-chat {
      width: 52px; height: 52px; border-radius: 50%;
      background: white; color: var(--primary); font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 18px rgba(0,0,0,0.2); cursor: pointer;
      border: none; padding: 0; margin: 0; transition: transform 0.2s;
    }
    .btn-chat:hover { transform: scale(1.1); }
    
    .btn-emoji {
      position: fixed; bottom: 25px; left: 25px;
      width: 52px; height: 52px; border-radius: 50%;
      background: white; color: var(--text); font-size: 22px;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 5px 18px rgba(0,0,0,0.2); cursor: pointer;
      border: none; padding: 0; margin: 0; transition: transform 0.2s; z-index: 90;
    }
    .btn-emoji.active { display: flex; }
    .btn-emoji:hover { transform: scale(1.1); }

    .chat-badge {
      position: absolute; top: -5px; right: -5px;
      width: 22px; height: 22px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 11px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white; z-index: 91; pointer-events: none;
    }
    .hidden { display: none !important; }

    /* CHAT */
    .chat-window {
      position: fixed; bottom: 85px; right: 20px;
      width: 290px; max-height: 350px;
      background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
      border-radius: 18px; box-shadow: 0 12px 35px rgba(0,0,0,0.25);
      display: none; flex-direction: column; overflow: hidden;
      z-index: 100; border: 1px solid rgba(255,255,255,0.6);
      animation: popUp 0.3s ease;
    }
    .chat-window.active { display: flex; }
    @keyframes popUp { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    
    .chat-header {
      padding: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center;
    }
    .chat-close { background: rgba(255,255,255,0.25); border: none; color: white; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0; box-shadow: none; }
    
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column-reverse; gap: 8px;
      background: #f4f6f9; min-height: 180px; max-height: 230px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    
    .msg {
      max-width: 85%; padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.4;
      position: relative; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .msg.p1 { background: #e3f2fd; border: 1px solid #90caf9; color: #1565c0; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.p2 { background: #ffffff; border: 1px solid #e0e0e0; color: #333333; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-name { font-size: 10px; font-weight: 700; margin-bottom: 3px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.5px; }
    .msg-time { font-size: 9px; opacity: 0.6; text-align: right; margin-top: 4px; }
    
    .chat-input-area {
      display: flex; padding: 10px; border-top: 1px solid var(--border); background: white; gap: 8px;
    }
    .chat-input-area input { margin: 0; padding: 10px 14px; font-size: 13px; border-radius: 20px; flex: 1; }
    .chat-input-area button { width: 42px; padding: 0; margin: 0; border-radius: 50%; font-size: 16px; }

    /* REACCIONES */
    .emoji-picker {
      position: fixed; bottom: 85px; left: 25px;
      background: white; border-radius: 16px; padding: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      display: none; grid-template-columns: repeat(3, 1fr); gap: 6px;
      z-index: 95; animation: popUp 0.25s ease;
    }
    .emoji-picker.active { display: grid; }
    .emoji-btn {
      width: 40px; height: 40px; border: none; background: var(--bg);
      border-radius: 10px; font-size: 22px; cursor: pointer; transition: 0.2s;
    }
    .emoji-btn:hover { background: #eef1ff; transform: scale(1.15); }

    .reaction-bubble {
      position: fixed; width: 85px; height: 85px;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
      border-radius: 50%; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      z-index: 80; cursor: grab; touch-action: none;
      border: 2px solid var(--primary);
      transition: transform 0.1s ease;
    }
    .reaction-bubble:active { cursor: grabbing; transform: scale(1.05); }
    .reaction-emoji { font-size: 34px; pointer-events: none; line-height: 1; }
    .reaction-sender { font-size: 10px; font-weight: 600; color: var(--primary); margin-top: 3px; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; text-align: center; }
    .bubble-dismiss {
      position: absolute; top: -5px; right: -5px;
      width: 22px; height: 22px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid white; z-index: 81;
    }

    /* MODALES */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-content {
      background: white; border-radius: 20px; padding: 28px 24px;
      max-width: 300px; width: 85%; text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-loader { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; margin: 0 auto 18px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .modal-text { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 18px; }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons button { flex: 1; margin: 0; padding: 12px; }

    /* CRÉDITOS CON BRILLO */
    .credits {
      font-family: 'Pacifico', cursive;
      font-size: 22px; color: white; text-align: center;
      margin-top: 28px; text-transform: uppercase; letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(102, 126, 234, 0.6), 0 0 30px rgba(118, 75, 162, 0.4);
      animation: creditGlow 3s ease-in-out infinite alternate;
      user-select: none;
    }
    @keyframes creditGlow {
      0% { text-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(102, 126, 234, 0.4); transform: translateY(0); }
      100% { text-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 35px rgba(102, 126, 234, 0.8), 0 0 50px rgba(118, 75, 162, 0.6); transform: translateY(-2px); }
    }
  </style>
</head>
<body>

<div class="app-container">
  <h1>Tres en Raya</h1>

  <!-- MENÚ -->
  <div id="view-menu" class="view active">
    <button onclick="showView('view-create')">Crear Sala Nueva</button>
    <button onclick="showView('view-join')" class="secondary">Unirse a Sala</button>
  </div>

  <!-- CREAR -->
  <div id="view-create" class="view">
    <input type="text" id="name-create" placeholder="Tu nombre" maxlength="12">
    <button onclick="createRoom()">Generar Código</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- ESPERANDO -->
  <div id="view-wait" class="view">
    <p style="text-align:center;color:var(--text-muted);margin-bottom:10px;font-size:14px">Comparte este código:</p>
    <div id="room-code" class="code-box">------</div>
    <button onclick="copyCode()">Copiar Código</button>
    <p style="text-align:center;margin:12px 0;color:var(--text-muted);font-size:13px">Esperando al segundo jugador...</p>
    <button onclick="leaveGame()" class="secondary" style="margin-top:10px">Cancelar y Salir</button>
  </div>

  <!-- UNIRSE -->
  <div id="view-join" class="view">
    <input type="text" id="name-join" placeholder="Tu nombre" maxlength="12">
    <input type="text" id="code-join" placeholder="Código (6 letras)" maxlength="6" style="text-transform:uppercase;letter-spacing:2px">
    <button onclick="joinRoom()">Unirse a la Sala</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- JUEGO -->
  <div id="view-game" class="view">
    <div class="players">
      <div id="card-p1" class="player-card">
        <div class="player-name" id="name-p1">Jugador 1</div>
        <div class="player-symbol">X</div>
      </div>
      <div id="card-p2" class="player-card">
        <div class="player-name" id="name-p2">Jugador 2</div>
        <div class="player-symbol">O</div>
      </div>
    </div>

    <div id="status" class="status">Conectando...</div>
    <div id="board" class="board"></div>

    <button id="btn-rematch" onclick="requestRematch()" class="hidden success">Solicitar Revancha</button>
    <button onclick="leaveGame()" class="secondary">Salir de la Partida</button>
  </div>
</div>

<!-- BOTÓN CHAT (DERECHA) -->
<div class="btn-chat-wrap">
  <button class="btn-chat" onclick="toggleChat()">💬</button>
  <div id="chat-badge" class="chat-badge hidden">0</div>
</div>

<!-- BOTÓN EMOJIS (IZQUIERDA) -->
<button id="btn-emoji" class="btn-emoji" onclick="toggleEmojiPicker()">😊</button>

<!-- CHAT WINDOW -->
<div id="chat-window" class="chat-window">
  <div class="chat-header">
    <span>Chat de Sala</span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="100">
    <button id="chat-send" onclick="sendChatMessage()">➤</button>
  </div>
</div>

<!-- EMOJI PICKER -->
<div id="emoji-picker" class="emoji-picker">
  <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
  <button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
  <button class="emoji-btn" onclick="sendReaction('😖')">😖</button>
  <button class="emoji-btn" onclick="sendReaction('😡')">😡</button>
  <button class="emoji-btn" onclick="sendReaction('😭')">😭</button>
  <button class="emoji-btn" onclick="sendReaction('😲')">😲</button>
  <button class="emoji-btn" onclick="sendReaction('😁')">😁</button>
  <button class="emoji-btn" onclick="sendReaction('🥰')">🥰</button>
  <button class="emoji-btn" onclick="sendReaction('😍')">😍</button>
</div>

<!-- BURBUJA DE REACCIÓN -->
<div id="bubble" class="reaction-bubble">
  <div class="bubble-dismiss" onclick="dismissReaction(event)">✕</div>
  <div class="reaction-emoji" id="b-emoji"></div>
  <div class="reaction-sender" id="b-sender"></div>
</div>

<div class="credits">BerMatCode</div>

<!-- MODAL GENÉRICO -->
<div id="modal" class="modal-overlay">
  <div class="modal-content">
    <div id="modal-loader" class="modal-loader hidden"></div>
    <div id="modal-title" class="modal-title">Título</div>
    <div id="modal-text" class="modal-text">Mensaje</div>
    <div id="modal-buttons" class="modal-buttons">
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc, serverTimestamp, collection, query, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-MIB8DbCF3YDAqb2qGRO6sjgUzg-sb-I",
    authDomain: "tres-en-raya1.firebaseapp.com",
    projectId: "tres-en-raya1",
    storageBucket: "tres-en-raya1.firebasestorage.app",
    messagingSenderId: "728066446875",
    appId: "1:728066446875:web:d80726479234f1cf580abe",
    measurementId: "G-P41C6EYSRT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let roomId = null, myName = "", myPlayer = null, gameData = null, unsub = null, chatUnsub = null;
  let unreadCount = 0, isChatOpen = false, isDragging = false;

  // === PERSISTENCIA ===
  function saveSession(id, name, p) {
    localStorage.setItem('tic_room', id);
    localStorage.setItem('tic_name', name);
    localStorage.setItem('tic_player', p);
  }
  function clearSession() {
    localStorage.removeItem('tic_room'); localStorage.removeItem('tic_name'); localStorage.removeItem('tic_player');
  }
  function loadSession() {
    const id = localStorage.getItem('tic_room');
    if (id) { roomId = id; myName = localStorage.getItem('tic_name'); myPlayer = parseInt(localStorage.getItem('tic_player')); return true; }
    return false;
  }

  // === NAVEGACIÓN & MODALES ===
  window.showView = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };
  window.showLoading = (t, txt) => {
    document.getElementById('modal-loader').classList.remove('hidden');
    document.getElementById('modal-title').textContent = t;
    document.getElementById('modal-text').textContent = txt;
    document.getElementById('modal-buttons').classList.add('hidden');
    document.getElementById('modal').classList.add('active');
  };
  window.showModal = (t, txt, btns = [{text:'Cerrar', class:'', onclick:closeModal}]) => {
    document.getElementById('modal-loader').classList.add('hidden');
    document.getElementById('modal-title').textContent = t;
    document.getElementById('modal-text').textContent = txt;
    const b = document.getElementById('modal-buttons');
    b.classList.remove('hidden'); b.innerHTML = '';
    btns.forEach(x => {
      const btn = document.createElement('button');
      btn.textContent = x.text; btn.className = x.class || '';
      btn.onclick = () => { if(x.onclick) x.onclick(); closeModal(); };
      b.appendChild(btn);
    });
    document.getElementById('modal').classList.add('active');
  };
  window.closeModal = () => document.getElementById('modal').classList.remove('active');

  function generateCode() {
    const c = "BERMATCODE";
    return Array.from({length: 6}, () => c[Math.floor(Math.random() * c.length)]).join('');
  }

  // === CREAR / UNIR ===
  window.createRoom = async () => {
    myName = document.getElementById('name-create').value.trim();
    if (!myName) return showModal("Error", "Ingresa tu nombre.");
    showLoading("Creando sala", "Generando código único y preparando la partida...");
    setTimeout(async () => {
      roomId = generateCode(); myPlayer = 1;
      try {
        await setDoc(doc(db, "games", roomId), {
          p1: myName, p2: null, board: Array(9).fill(""), turn: "p1", winner: null, winCells: null,
          status: "waiting", rematchReq: null, rematchStat: "none", reaction: null, created: serverTimestamp()
        });
        saveSession(roomId, myName, 1); closeModal();
        document.getElementById('room-code').textContent = roomId;
        showView('view-wait'); listenGame();
      } catch(e) { closeModal(); showModal("Error", "Fallo de conexión."); }
    }, 1000);
  };

  window.joinRoom = async () => {
    myName = document.getElementById('name-join').value.trim();
    const code = document.getElementById('code-join').value.trim().toUpperCase();
    if (!myName || !code || code.length !== 6) return showModal("Error", "Completa datos válidos.");
    showLoading("Uniéndote", "Conectando con la partida...");
    setTimeout(async () => {
      try {
        const snap = await getDoc(doc(db, "games", code));
        if (!snap.exists()) return closeModal(), showModal("Error", "Sala no encontrada.");
        const d = snap.data();
        if (d.p2) return closeModal(), showModal("Error", "Sala llena.");
        if (d.status !== "waiting") return closeModal(), showModal("Error", "No disponible.");
        roomId = code; myPlayer = 2;
        await updateDoc(doc(db, "games", roomId), { p2: myName, status: "playing" });
        saveSession(roomId, myName, 2); closeModal();
        showView('view-game'); listenGame();
      } catch(e) { closeModal(); showModal("Error", "No se pudo unir."); }
    }, 1000);
  };

  // === LISTENERS ===
  function listenGame() {
    if (unsub) unsub();
    unsub = onSnapshot(doc(db, "games", roomId), (snap) => {
      if (!snap.exists()) return;
      gameData = snap.data();
      if (gameData.status === "playing" || gameData.p2) {
        if (document.getElementById('view-wait').classList.contains('active')) showView('view-game');
        document.getElementById('btn-emoji').classList.add('active'); // Mostrar botón de emojis
      }
      document.getElementById('name-p1').textContent = gameData.p1;
      document.getElementById('name-p2').textContent = gameData.p2 || "Esperando...";
      document.getElementById('card-p1').className = 'player-card' + (myPlayer===1?' me':'');
      document.getElementById('card-p2').className = 'player-card' + (myPlayer===2?' me':'');
      renderBoard(); updateReactionUI(gameData.reaction || null);
      if (gameData.rematchReq && gameData.rematchStat==="pending" && gameData.rematchReq!==myPlayer) {
        const n = gameData.rematchReq===1?gameData.p1:gameData.p2;
        showModal("Solicitud de revancha", `${n} quiere jugar otra vez.`, [
          {text:"Aceptar", class:"success", onclick:acceptRematch}, {text:"Rechazar", class:"danger", onclick:rejectRematch}
        ]);
      }
    });
    listenChat();
  }

  function listenChat() {
    if (chatUnsub) chatUnsub();
    const q = query(collection(db, "games", roomId, "chats"), orderBy("timestamp", "desc"));
    chatUnsub = onSnapshot(q, (snap) => {
      const el = document.getElementById('chat-messages');
      el.innerHTML = '';
      snap.forEach(ds => {
        const m = ds.data();
        const div = document.createElement('div');
        div.className = m.sender === 1 ? 'msg p1' : 'msg p2';
        const t = m.timestamp ? new Date(m.timestamp.toMillis()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
        div.innerHTML = `<div class="msg-name">${m.name}</div><div>${m.text}</div><div class="msg-time">${t}</div>`;
        el.appendChild(div);
      });
      if (!isChatOpen && snap.docChanges().length > 0 && gameData) {
        const isNew = snap.docChanges().some(c => c.type==='added' && c.doc.data().sender !== myPlayer);
        if (isNew) { unreadCount++; document.getElementById('chat-badge').textContent = unreadCount>9?'9+':unreadCount; document.getElementById('chat-badge').classList.remove('hidden'); }
      }
    });
  }

  window.toggleChat = () => {
    isChatOpen = !isChatOpen;
    document.getElementById('chat-window').classList.toggle('active');
    if (isChatOpen) { unreadCount=0; document.getElementById('chat-badge').classList.add('hidden'); document.getElementById('chat-input').focus(); }
  };
  window.sendChatMessage = async () => {
    const inp = document.getElementById('chat-input');
    const txt = inp.value.trim();
    if (!txt || !roomId) return;
    try { await addDoc(collection(db, "games", roomId, "chats"), { text:txt, sender:myPlayer, name:myName, timestamp:serverTimestamp() }); inp.value=''; } catch(e) { showModal("Error", "No se pudo enviar el mensaje."); }
  };
  document.getElementById('chat-input').addEventListener('keypress', e => { if(e.key==='Enter') window.sendChatMessage(); });

  // === TABLERO ===
  function renderBoard() {
    const b = document.getElementById('board'), st = document.getElementById('status'), rb = document.getElementById('btn-rematch');
    const isMyTurn = !gameData.winner && gameData.turn === (myPlayer===1?'p1':'p2');
    document.getElementById('card-p1').classList.remove('active');
    document.getElementById('card-p2').classList.remove('active');
    if(!gameData.winner) document.getElementById(gameData.turn==='p1'?'card-p1':'card-p2').classList.add('active');
    b.innerHTML = '';
    gameData.board.forEach((c,i) => {
      const d = document.createElement('div');
      d.className = 'cell' + (c?` ${c.toLowerCase()} taken`:'');
      if(gameData.winCells && gameData.winCells.includes(i)) d.classList.add('winner');
      d.textContent = c;
      if(!c && isMyTurn && !gameData.winner) d.onclick = () => makeMove(i);
      b.appendChild(d);
    });
    st.className = 'status';
    if(gameData.winner) {
      st.classList.add('finished');
      st.textContent = gameData.winner==='draw'?'Empate':(gameData.winner===(myPlayer===1?'p1':'p2')?'Ganaste':'Perdiste');
      rb.classList.remove('hidden');
    } else if(isMyTurn) {
      st.classList.add('my-turn'); st.textContent = 'Tu turno'; rb.classList.add('hidden');
    } else {
      st.classList.add('their-turn'); st.textContent = `Turno de ${myPlayer===1?gameData.p2:gameData.p1}`; rb.classList.add('hidden');
    }
  }
  window.makeMove = async (i) => {
    if(!gameData||gameData.board[i]||gameData.winner||gameData.turn!==(myPlayer===1?'p1':'p2')) return;
    const nb=[...gameData.board]; nb[i]=myPlayer===1?'X':'O';
    const w=checkWin(nb), draw=!w&&!nb.includes("");
    const up={board:nb};
    if(w) Object.assign(up,{winner:w,winCells:getCells(nb,w),status:"finished"});
    else if(draw) Object.assign(up,{winner:'draw',status:"finished"});
    else up.turn=myPlayer===1?'p2':'p1';
    try{await updateDoc(doc(db,"games",roomId),up);}catch(e){}
  };
  function checkWin(b){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let c of p)if(b[c[0]]&&b[c[0]]===b[c[1]]&&b[c[0]]===b[c[2]])return b[c[0]]==='X'?'p1':'p2';return null;}
  function getCells(b,w){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let c of p)if(b[c[0]]&&b[c[0]]===b[c[1]]&&b[c[0]]===b[c[2]])return c;return [];}

  // === REVANCHA ===
  window.requestRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{rematchReq:myPlayer,rematchStat:"pending"});showModal("Solicitud enviada","Esperando respuesta...");}catch(e){}};
  window.acceptRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{board:Array(9).fill(""),turn:"p1",winner:null,winCells:null,rematchReq:null,rematchStat:"none",status:"playing"});}catch(e){}};
  window.rejectRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{rematchReq:null,rematchStat:"rejected"});}catch(e){}};

  // === REACCIONES ===
  window.toggleEmojiPicker=()=>document.getElementById('emoji-picker').classList.toggle('active');
  window.sendReaction=async(em)=>{
    if(!gameData)return;
    const x=(window.innerWidth/2)-42, y=(window.innerHeight/2)-160;
    try{await updateDoc(doc(db,"games",roomId),{reaction:{emoji:em,sender:myName,x,y}});document.getElementById('emoji-picker').classList.remove('active');}catch(e){}
  };
  window.dismissReaction=async(e)=>{e.stopPropagation();if(gameData.reaction&&gameData.reaction.sender===myName)try{await updateDoc(doc(db,"games",roomId),{reaction:null});}catch(e){}};
  function updateReactionUI(r){
    const bub=document.getElementById('bubble');
    if(!r||!r.emoji){bub.style.display='none';return;}
    bub.style.display='flex';
    document.getElementById('b-emoji').textContent=r.emoji;
    document.getElementById('b-sender').textContent=r.sender;
    if(r.x!==undefined&&r.y!==undefined){bub.style.left=r.x+'px';bub.style.top=r.y+'px';}
    else{bub.style.left=(window.innerWidth/2-42)+'px';bub.style.top=(window.innerHeight/2-160)+'px';}
  }
  const bubble=document.getElementById('bubble');
  bubble.addEventListener('pointerdown',e=>{isDragging=true;bubble.setPointerCapture(e.pointerId);bubble.style.transition='none';});
  bubble.addEventListener('pointermove',e=>{
    if(!isDragging)return;e.preventDefault();
    let x=e.clientX-42, y=e.clientY-42;
    x=Math.max(0,Math.min(window.innerWidth-85,x));
    y=Math.max(0,Math.min(window.innerHeight-85,y));
    bubble.style.left=x+'px';bubble.style.top=y+'px';
  });
  bubble.addEventListener('pointerup',async e=>{
    if(!isDragging)return;isDragging=false;bubble.style.transition='transform 0.1s';bubble.releasePointerCapture(e.pointerId);
    if(gameData.reaction)try{await updateDoc(doc(db,"games",roomId),{"reaction.x":parseInt(bubble.style.left),"reaction.y":parseInt(bubble.style.top)});}catch(e){}
  });

  // === UTILIDADES ===
  window.copyCode=()=>navigator.clipboard.writeText(roomId).then(()=>showModal("Copiado","Envía el código a tu pareja."));
  window.leaveGame=async()=>{
    if(unsub)unsub();if(chatUnsub)chatUnsub();clearSession();
    if(myPlayer===1&&roomId)try{await deleteDoc(doc(db,"games",roomId));}catch(e){}
    document.getElementById('btn-emoji').classList.remove('active');
    document.getElementById('emoji-picker').classList.remove('active');
    document.getElementById('chat-window').classList.remove('active');
    document.getElementById('bubble').style.display='none';
    document.getElementById('btn-rematch').classList.add('hidden');
    showView('view-menu');
    document.getElementById('name-create').value='';document.getElementById('name-join').value='';document.getElementById('code-join').value='';
    unreadCount=0;isChatOpen=false;
  };

  // === INIT ===
  (function init(){
    document.getElementById('board').innerHTML=Array(9).fill('<div class="cell"></div>').join('');
    if(loadSession()){showView('view-game');listenGame();}else{showView('view-menu');}
  })();
</script>
</body>
</html>
