<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#9370DB" />
  <meta name="apple-mobile-web-app-status-bar-style" content="#9370DB" />
  <title>✦ Tres en Raya ✦ BerMatCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Montserrat:wght@400;500&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #9370DB;
      --primary-light: #B19CD9;
      --secondary: #764ba2;
      --success: #2ecc71;
      --danger: #e74c3c;
      --bg-dark: #0d0a15;
      --card-bg: rgba(10, 7, 20, 0.75);
      --text: #f0e6ff;
      --text-muted: #a89ec8;
      --border: rgba(147, 112, 219, 0.25);
      --input-bg: rgba(12, 8, 22, 0.6);
      --chat-me: #dcf8c6;
      --chat-other: #ffffff;
      --chat-bg: #efeae2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      height: 100dvh; width: 100vw;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-dark) url('https://i.postimg.cc/XJyY4tCS/1763421218.png') no-repeat center center/cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--text);
    }

    .app-container {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 380px; width: 92%;
      box-shadow: 
        0 4px 20px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 0 12px rgba(147, 112, 219, 0.15);
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      border: 1px solid var(--border);
    }
    
    .app-container::before {
      content: '';
      position: absolute;
      top: 1px; left: 1px; right: 1px; bottom: 1px;
      border-radius: 15px;
      background: linear-gradient(135deg, rgba(177, 156, 217, 0.15), transparent 85%);
      pointer-events: none;
      z-index: 1;
    }

    .credits-top {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
      text-align: center;
      letter-spacing: 0.4px;
    }
    .credits-top span {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      background: linear-gradient(92deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
      background: linear-gradient(95deg, #E6E6FA, #D8BFD8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 1px 3px rgba(147, 112, 219, 0.25);
    }

    .view { display: none; width: 100%; animation: slideIn 0.3s ease; }
    .view.active { display: block; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    input {
      width: 100%; padding: 11px 14px; margin: 9px 0;
      border: 1px solid rgba(130, 90, 190, 0.35); border-radius: 10px;
      font-size: 0.95rem; text-align: center; font-weight: 500;
      transition: all 0.25s ease; background: var(--input-bg);
      color: var(--text); font-family: 'Montserrat', sans-serif;
    }
    input:focus { 
      outline: none; 
      border-color: var(--primary); 
      box-shadow: 0 0 0 3px rgba(147, 112, 219, 0.25); 
      background: rgba(18, 14, 32, 0.8);
    }
    input::placeholder { color: rgba(210, 200, 240, 0.5); }

    button {
      width: 100%; padding: 12px; margin: 7px 0; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #0c0818; font-size: 0.98rem; font-weight: 600; font-family: 'Poppins', sans-serif;
      cursor: pointer; transition: all 0.25s ease; letter-spacing: 0.3px;
      box-shadow: 0 3px 10px rgba(147, 112, 219, 0.4), 0 1px 3px rgba(0, 0, 0, 0.25);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(147, 112, 219, 0.55), 0 2px 4px rgba(0, 0, 0, 0.3); }
    button:active { transform: translateY(0); }
    button.secondary { 
      background: rgba(255, 255, 255, 0.08); 
      color: var(--text-muted); 
      border: 1px solid rgba(147, 112, 219, 0.2);
      box-shadow: none;
    }
    button.secondary:hover { background: rgba(147, 112, 219, 0.15); color: var(--text); }
    button.success { background: linear-gradient(135deg, var(--success), #27ae60); color: white; }
    button.danger { background: linear-gradient(135deg, var(--danger), #c0392b); color: white; }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    /* Botones de inicio de turno - NUEVOS */
    .starter-controls {
      display: flex; flex-direction: column; gap: 8px; margin: 10px 0; width: 100%;
      animation: slideIn 0.3s ease;
    }
    .starter-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; font-weight: 600; font-size: 0.9rem;
      box-shadow: 0 3px 12px rgba(118, 75, 162, 0.4);
    }
    .starter-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 5px 18px rgba(118, 75, 162, 0.6); 
    }
    .starter-btn:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none !important;
    }
    .starter-info {
      font-size: 0.8rem; color: var(--text-muted); text-align: center;
      padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px;
    }
    .starter-decided {
      background: linear-gradient(135deg, var(--success), #27ae60);
      color: white; font-weight: 600; text-align: center;
      padding: 10px; border-radius: 10px; margin: 8px 0;
      animation: pulse 2s infinite;
    }

    .code-box {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #0c0818; padding: 18px; border-radius: 14px;
      text-align: center; font-size: 24px; font-weight: 700; font-family: 'Poppins', sans-serif;
      letter-spacing: 4px; margin: 16px 0; 
      box-shadow: 0 6px 20px rgba(147, 112, 219, 0.4);
      border: 2px dashed rgba(255,255,255,0.3);
    }

    .players { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 14px; width: 100%; }
    .player-card {
      flex: 1; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.08);
      text-align: center; border: 2px solid transparent; transition: all 0.3s;
      font-size: 0.85rem;
    }
    .player-card.active { 
      border-color: var(--primary); 
      background: rgba(147, 112, 219, 0.2); 
      transform: scale(1.03); 
      box-shadow: 0 0 10px rgba(147, 112, 219, 0.3);
    }
    .player-card.me { 
      background: linear-gradient(135deg, var(--primary), var(--primary-light)); 
      color: #0c0818; 
      font-weight: 600;
    }
    .player-name { font-weight: 600; margin-bottom: 3px; font-size: 0.8rem; }
    .player-symbol { font-size: 16px; font-weight: 700; }

    .status {
      padding: 10px; border-radius: 12px; text-align: center; font-weight: 600; font-size: 0.9rem;
      margin: 12px 0; width: 100%; transition: all 0.3s; 
      background: rgba(255,255,255,0.08); color: var(--text-muted);
    }
    .status.my-turn { 
      background: linear-gradient(135deg, var(--success), #27ae60); 
      color: white; 
      animation: pulse 2s infinite; 
    }
    .status.their-turn { 
      background: linear-gradient(135deg, var(--text-muted), #8a7aa8); 
      color: white; 
    }
    .status.finished { 
      background: linear-gradient(135deg, var(--danger), #c0392b); 
      color: white; 
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }

    .board {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin: 14px auto; width: 100%; max-width: 250px;
    }
    .cell {
      aspect-ratio: 1; background: rgba(255,255,255,0.08); border: 2px solid var(--border); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 30px; font-weight: 700;
      color: var(--text);
    }
    .cell:hover:not(.taken) { background: rgba(147, 112, 219, 0.25); border-color: var(--primary); transform: scale(1.04); }
    .cell.x { color: var(--danger); background: rgba(231, 76, 60, 0.15); border-color: var(--danger); }
    .cell.o { color: var(--primary-light); background: rgba(147, 112, 219, 0.15); border-color: var(--primary); }
    .cell.taken { cursor: default; }
    .cell.winner { 
      background: linear-gradient(135deg, var(--success), #27ae60); 
      color: white; border-color: var(--success); 
      animation: winPop 0.4s; 
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); 
    }
    @keyframes winPop { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }

    /* CONTROLES SEPARADOS */
    .left-controls {
      position: fixed; bottom: 25px; left: 25px; z-index: 90; display: none; align-items: center; gap: 10px;
    }
    .right-controls {
      position: fixed; bottom: 25px; right: 25px; z-index: 90; display: none; align-items: center; gap: 10px;
    }
    .left-controls.active { display: flex; }
    .right-controls.active { display: flex; }

    .trigger-btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.12); color: var(--text); font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25); cursor: pointer;
      transition: transform 0.2s; border: 1px solid var(--border); padding: 0; margin: 0;
    }
    .trigger-btn:hover { transform: scale(1.1); background: rgba(147, 112, 219, 0.25); }

    /* CHAT ESTILO WHATSAPP */
    .chat-window {
      position: fixed; bottom: 85px; right: 25px;
      width: 290px; max-height: 340px;
      background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
      border-radius: 18px; box-shadow: 0 12px 35px rgba(0,0,0,0.25);
      display: none; flex-direction: column; overflow: hidden;
      z-index: 100; border: 1px solid rgba(255,255,255,0.6);
      animation: popUp 0.3s ease;
    }
    .chat-window.active { display: flex; }
    @keyframes popUp { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    
    .chat-header {
      padding: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #0c0818; font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center;
    }
    .chat-close { 
      background: rgba(12,8,24,0.2); border: none; color: #0c0818; 
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer; 
      font-size: 13px; display: flex; align-items: center; justify-content: center; 
      padding: 0; margin: 0; box-shadow: none; 
    }
    
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column-reverse; gap: 9px;
      background: var(--chat-bg); min-height: 190px; max-height: 230px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    
    .msg {
      max-width: 80%; padding: 9px 13px; border-radius: 16px; font-size: 13px; line-height: 1.4;
      position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .msg.me { 
      align-self: flex-end; 
      background: var(--chat-me); 
      border: 1px solid #c8e6b9; 
      color: #111b21; 
      border-bottom-right-radius: 4px; 
    }
    .msg.other { 
      align-self: flex-start; 
      background: var(--chat-other); 
      border: 1px solid #e0e0e0; 
      color: #111b21; 
      border-bottom-left-radius: 4px; 
    }
    .msg-name { font-size: 10px; font-weight: 700; margin-bottom: 2px; opacity: 0.75; }
    .msg-time { font-size: 9px; opacity: 0.5; text-align: right; margin-top: 3px; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
    
    .chat-input-area {
      display: flex; padding: 9px; border-top: 1px solid var(--border); background: white; gap: 7px; align-items: center;
    }
    .chat-input-area input { 
      margin: 0; padding: 10px 13px; font-size: 13px; border-radius: 22px; flex: 1; 
      border: 1px solid #e0e0e0; background: #f0f2f5; color: #333;
    }
    .chat-input-area button { 
      width: 40px; height: 40px; padding: 0; margin: 0; border-radius: 50%; font-size: 17px; 
      display: flex; align-items: center; justify-content: center; 
      background: var(--primary); color: white; border: none; cursor: pointer;
    }

    /* BADGE DE NOTIFICACIÓN */
    .chat-badge {
      position: absolute; top: -4px; right: -4px;
      width: 19px; height: 19px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 10px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white; z-index: 91; pointer-events: none;
      animation: badgePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }

    /* REACCIONES */
    .emoji-picker {
      position: fixed; bottom: 85px; left: 25px;
      background: rgba(255,255,255,0.95); border-radius: 16px; padding: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      display: none; grid-template-columns: repeat(3, 1fr); gap: 7px;
      z-index: 95; animation: popUp 0.25s ease; border: 1px solid var(--border);
    }
    .emoji-picker.active { display: grid; }
    .emoji-btn {
      width: 40px; height: 40px; border: none; background: rgba(255,255,255,0.1);
      border-radius: 10px; font-size: 22px; cursor: pointer; transition: 0.2s; color: var(--text);
    }
    .emoji-btn:hover { background: rgba(147, 112, 219, 0.25); transform: scale(1.15); }

    .reaction-bubble {
      position: fixed; width: 85px; height: 85px;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
      border-radius: 50%; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      z-index: 80; cursor: grab; touch-action: none;
      border: 2px solid var(--primary);
      transition: transform 0.1s ease;
    }
    .reaction-bubble:active { cursor: grabbing; transform: scale(1.05); }
    .reaction-emoji { font-size: 34px; pointer-events: none; line-height: 1; }
    .reaction-sender { font-size: 9px; font-weight: 600; color: var(--primary); margin-top: 2px; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; text-align: center; }
    .bubble-dismiss {
      position: absolute; top: -4px; right: -4px;
      width: 20px; height: 20px; background: var(--danger); color: white;
      border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid white; z-index: 81;
    }

    /* MODALES */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-content {
      background: white; border-radius: 18px; padding: 24px 20px;
      max-width: 290px; width: 85%; text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-loader { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; margin: 0 auto 16px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-title { font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 600; color: #333; margin-bottom: 9px; }
    .modal-text { font-size: 13.5px; color: #555; line-height: 1.5; margin-bottom: 16px; }
    .modal-buttons { display: flex; gap: 9px; }
    .modal-buttons button { flex: 1; margin: 0; padding: 11px; font-size: 0.9rem; }

    /* ALERT POPUP */
    .alert-popup {
      position: fixed;
      top: 25%;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      z-index: 1000;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(147, 112, 219, 0.2);
      opacity: 0;
      transition: all 0.25s ease;
      background: rgba(18, 14, 32, 0.95);
      color: var(--text);
    }
    .alert-popup.error { background: rgba(180, 50, 50, 0.9); color: #ffe6e6; }
    .alert-popup.success { background: rgba(40, 140, 80, 0.9); color: #e6f7e6; }
    .alert-popup.info { background: rgba(60, 90, 160, 0.9); color: #e0e8ff; }
    .alert-popup.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* CRÉDITOS CON BRILLO */
    .credits {
      font-family: 'Pacifico', cursive;
      font-size: 20px;
      color: #ffffff;
      text-align: center;
      margin-top: 20px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(147, 112, 219, 1), 0 0 30px rgba(118, 75, 162, 0.8);
      animation: glowPulse 3s infinite alternate;
    }
    @keyframes glowPulse {
      from { text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(147, 112, 219, 0.8); }
      to { text-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px rgba(147, 112, 219, 1), 0 0 40px rgba(118, 75, 162, 1); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="credits-top"><span>𖤍BerMat_Code𖤍</span></div>
  <h1>✦ Tres en Raya ✦</h1>

  <!-- MENÚ -->
  <div id="view-menu" class="view active">
    <button onclick="showView('view-create')">Crear Sala Nueva</button>
    <button onclick="showView('view-join')" class="secondary">Unirse a Sala</button>
  </div>

  <!-- CREAR -->
  <div id="view-create" class="view">
    <input type="text" id="name-create" placeholder="Tu nombre" maxlength="12">
    <button onclick="createRoom()">Generar Código</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- ESPERANDO -->
  <div id="view-wait" class="view">
    <p style="text-align:center;color:var(--text-muted);margin-bottom:9px;font-size:0.85rem">Comparte este código:</p>
    <div id="room-code" class="code-box">------</div>
    <button onclick="copyCode()">Copiar Código</button>
    <p style="text-align:center;margin:10px 0;color:var(--text-muted);font-size:0.82rem">Esperando al segundo jugador...</p>
    <button onclick="leaveGame()" class="secondary" style="margin-top:9px">Cancelar y Salir</button>
  </div>

  <!-- UNIRSE -->
  <div id="view-join" class="view">
    <input type="text" id="name-join" placeholder="Tu nombre" maxlength="12">
    <input type="text" id="code-join" placeholder="Código (6 letras)" maxlength="6" style="text-transform:uppercase;letter-spacing:2px">
    <button onclick="joinRoom()">Unirse a la Sala</button>
    <button onclick="showView('view-menu')" class="secondary">Volver</button>
  </div>

  <!-- JUEGO -->
  <div id="view-game" class="view">
    <div class="players">
      <div id="card-p1" class="player-card">
        <div class="player-name" id="name-p1">Jugador 1</div>
        <div class="player-symbol">X</div>
      </div>
      <div id="card-p2" class="player-card">
        <div class="player-name" id="name-p2">Jugador 2</div>
        <div class="player-symbol">O</div>
      </div>
    </div>

    <!-- NUEVO: Controles para elegir quién comienza -->
    <div id="starter-section" class="hidden">
      <div id="starter-pending" class="starter-controls">
        <div class="starter-info">🎮 Define quién comienza la partida</div>
        <button id="btn-i-start" class="starter-btn" onclick="requestStart()">✦ Quiero comenzar yo</button>
        <button id="btn-give-turn" class="starter-btn secondary" onclick="giveTurn()">✦ Ceder turno al otro</button>
      </div>
      <div id="starter-request-modal" class="starter-controls hidden">
        <div class="starter-info">🔄 <span id="req-sender-name"></span> quiere comenzar</div>
        <button class="starter-btn success" onclick="acceptStartRequest()">✓ Aceptar</button>
        <button class="starter-btn danger" onclick="rejectStartRequest()">✗ Rechazar</button>
      </div>
      <div id="starter-decided-msg" class="starter-decided hidden">
        ✦ Comienza <span id="starter-name"></span> ✦
      </div>
    </div>

    <div id="status" class="status">Conectando...</div>
    <div id="board" class="board"></div>

    <button id="btn-rematch" onclick="requestRematch()" class="hidden success">Solicitar Revancha</button>
    <button onclick="leaveGame()" class="secondary">Salir de la Partida</button>
  </div>
</div>

<!-- CONTROLES IZQUIERDA (REACCIONES) -->
<div id="reaction-container" class="left-controls">
  <button class="trigger-btn" onclick="toggleEmojiPicker()">😊</button>
</div>

<!-- CONTROLES DERECHA (CHAT) -->
<div id="chat-container" class="right-controls">
  <button class="trigger-btn" onclick="toggleChat()">💬</button>
  <div id="chat-badge" class="chat-badge hidden">0</div>
</div>

<!-- PICKER DE EMOJIS (IZQUIERDA) -->
<div id="emoji-picker" class="emoji-picker">
  <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
  <button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
  <button class="emoji-btn" onclick="sendReaction('😖')">😖</button>
  <button class="emoji-btn" onclick="sendReaction('😡')">😡</button>
  <button class="emoji-btn" onclick="sendReaction('😭')">😭</button>
  <button class="emoji-btn" onclick="sendReaction('😲')">😲</button>
  <button class="emoji-btn" onclick="sendReaction('😁')">😁</button>
  <button class="emoji-btn" onclick="sendReaction('🥰')">🥰</button>
  <button class="emoji-btn" onclick="sendReaction('😍')">😍</button>
</div>

<!-- VENTANA DE CHAT (DERECHA) -->
<div id="chat-window" class="chat-window">
  <div class="chat-header">
    <span>Chat de Sala</span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="100">
    <button id="chat-send" onclick="sendChatMessage()">➤</button>
  </div>
</div>

<!-- BURBUJA DE REACCIÓN -->
<div id="bubble" class="reaction-bubble">
  <div class="bubble-dismiss" onclick="dismissReaction(event)">✕</div>
  <div class="reaction-emoji" id="b-emoji"></div>
  <div class="reaction-sender" id="b-sender"></div>
</div>

<div class="credits">BerMatCode</div>

<!-- MODAL GENÉRICO -->
<div id="modal" class="modal-overlay">
  <div class="modal-content">
    <div id="modal-loader" class="modal-loader hidden"></div>
    <div id="modal-title" class="modal-title">Título</div>
    <div id="modal-text" class="modal-text">Mensaje</div>
    <div id="modal-buttons" class="modal-buttons">
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- ALERT POPUP -->
<div id="alert" class="alert-popup"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc, serverTimestamp, collection, query, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-MIB8DbCF3YDAqb2qGRO6sjgUzg-sb-I",
    authDomain: "tres-en-raya1.firebaseapp.com",
    projectId: "tres-en-raya1",
    storageBucket: "tres-en-raya1.firebasestorage.app",
    messagingSenderId: "728066446875",
    appId: "1:728066446875:web:d80726479234f1cf580abe",
    measurementId: "G-P41C6EYSRT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let roomId = null, myName = "", myPlayer = null, gameData = null, unsub = null, chatUnsub = null;
  let unreadCount = 0, isChatOpen = false, isDragging = false;

  // === ALERT SYSTEM ===
  const showAlert = (msg, type = 'error') => {
    const a = document.getElementById('alert');
    a.textContent = msg;
    a.className = `alert-popup ${type}`;
    a.classList.add('show');
    setTimeout(() => a.classList.remove('show'), 2400);
  };

  // === PERSISTENCIA ===
  function saveSession(id, name, p) {
    localStorage.setItem('tic_room', id);
    localStorage.setItem('tic_name', name);
    localStorage.setItem('tic_player', p);
  }
  function clearSession() {
    localStorage.removeItem('tic_room'); localStorage.removeItem('tic_name'); localStorage.removeItem('tic_player');
  }
  function loadSession() {
    const id = localStorage.getItem('tic_room');
    if (id) { roomId = id; myName = localStorage.getItem('tic_name'); myPlayer = parseInt(localStorage.getItem('tic_player')); return true; }
    return false;
  }

  // === NAVEGACIÓN & MODALES ===
  window.showView = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };
  window.showLoading = (t, txt) => {
    document.getElementById('modal-loader').classList.remove('hidden');
    document.getElementById('modal-title').textContent = t;
    document.getElementById('modal-text').textContent = txt;
    document.getElementById('modal-buttons').classList.add('hidden');
    document.getElementById('modal').classList.add('active');
  };
  window.showModal = (t, txt, btns = [{text:'Cerrar', class:'', onclick:closeModal}]) => {
    document.getElementById('modal-loader').classList.add('hidden');
    document.getElementById('modal-title').textContent = t;
    document.getElementById('modal-text').textContent = txt;
    const b = document.getElementById('modal-buttons');
    b.classList.remove('hidden'); b.innerHTML = '';
    btns.forEach(x => {
      const btn = document.createElement('button');
      btn.textContent = x.text; btn.className = x.class || '';
      btn.onclick = () => { if(x.onclick) x.onclick(); closeModal(); };
      b.appendChild(btn);
    });
    document.getElementById('modal').classList.add('active');
  };
  window.closeModal = () => document.getElementById('modal').classList.remove('active');

  function generateCode() {
    const c = "BERMATCODE";
    return Array.from({length: 6}, () => c[Math.floor(Math.random() * c.length)]).join('');
  }

  // === CREAR / UNIR ===
  window.createRoom = async () => {
    myName = document.getElementById('name-create').value.trim();
    if (!myName) return showAlert("✍️ Ingresa tu nombre", 'error');
    showLoading("Creando sala", "Generando código único...");
    
    setTimeout(async () => {
      roomId = generateCode(); myPlayer = 1;
      try {
        await setDoc(doc(db, "games", roomId), {
          p1: myName, p2: null, board: Array(9).fill(""), turn: "p1", winner: null, winCells: null,
          status: "waiting", rematchReq: null, rematchStat: "none", reaction: null, 
          starterDecided: false, startingPlayer: null, startRequest: null,
          created: serverTimestamp()
        });
        saveSession(roomId, myName, 1); closeModal();
        document.getElementById('room-code').textContent = roomId;
        showView('view-wait'); listenGame();
        showAlert("✅ Sala creada", 'success');
      } catch(e) { 
        closeModal(); 
        showAlert("❌ Error de conexión", 'error'); 
      }
    }, 1000);
  };

  window.joinRoom = async () => {
    myName = document.getElementById('name-join').value.trim();
    const code = document.getElementById('code-join').value.trim().toUpperCase();
    if (!myName || !code || code.length !== 6) return showAlert("✍️ Completa datos válidos", 'error');
    
    showLoading("Uniéndote", "Conectando con la partida...");
    setTimeout(async () => {
      try {
        const snap = await getDoc(doc(db, "games", code));
        if (!snap.exists()) return closeModal(), showAlert("❌ Sala no encontrada", 'error');
        const d = snap.data();
        if (d.p2) return closeModal(), showAlert("❌ Sala llena", 'error');
        if (d.status !== "waiting") return closeModal(), showAlert("❌ No disponible", 'error');
        
        roomId = code; myPlayer = 2;
        await updateDoc(doc(db, "games", roomId), { 
          p2: myName, 
          status: "playing",
          // Inicializar campos de starter para jugador que se une
          starterDecided: false, 
          startingPlayer: null, 
          startRequest: null
        });
        saveSession(roomId, myName, 2); closeModal();
        showView('view-game'); listenGame();
        showAlert("✅ ¡Conectado!", 'success');
      } catch(e) { 
        closeModal(); 
        showAlert("❌ No se pudo unir", 'error'); 
      }
    }, 1000);
  };

  // === LISTENERS ===
  function listenGame() {
    if (unsub) unsub();
    unsub = onSnapshot(doc(db, "games", roomId), (snap) => {
      if (!snap.exists()) return;
      gameData = snap.data();
      
      // VALIDACIÓN: Botones solo visibles cuando hay 2 jugadores
      if (gameData.p2) {
        document.getElementById('chat-container').classList.add('active');
        document.getElementById('reaction-container').classList.add('active');
      } else {
        document.getElementById('chat-container').classList.remove('active');
        document.getElementById('reaction-container').classList.remove('active');
      }

      if (gameData.status === "playing") {
        if (document.getElementById('view-wait').classList.contains('active')) showView('view-game');
      }

      document.getElementById('name-p1').textContent = gameData.p1;
      document.getElementById('name-p2').textContent = gameData.p2 || "Esperando...";
      document.getElementById('card-p1').className = 'player-card' + (myPlayer===1?' me':'');
      document.getElementById('card-p2').className = 'player-card' + (myPlayer===2?' me':'');
      
      // === NUEVO: Manejo de selección de quién comienza ===
      updateStarterUI();
      
      renderBoard(); 
      updateReactionUI(gameData.reaction || null);
      
      if (gameData.rematchReq && gameData.rematchStat==="pending" && gameData.rematchReq!==myPlayer) {
        const n = gameData.rematchReq===1?gameData.p1:gameData.p2;
        showModal("Solicitud de revancha", `${n} quiere jugar otra vez.`, [
          {text:"Aceptar", class:"success", onclick:acceptRematch}, {text:"Rechazar", class:"danger", onclick:rejectRematch}
        ]);
      }
    });
    listenChat();
  }

  // === NUEVO: Actualizar UI de selección de turno inicial ===
  function updateStarterUI() {
    const section = document.getElementById('starter-section');
    const pending = document.getElementById('starter-pending');
    const requestModal = document.getElementById('starter-request-modal');
    const decidedMsg = document.getElementById('starter-decided-msg');
    const btnIStart = document.getElementById('btn-i-start');
    const btnGiveTurn = document.getElementById('btn-give-turn');
    
    // Solo mostrar si hay 2 jugadores, no hay ganador, y starter no ha sido decidido
    const canChooseStarter = gameData.p2 && !gameData.winner && !gameData.starterDecided && gameData.board.every(c => !c);
    
    if (!canChooseStarter) {
      section.classList.add('hidden');
      return;
    }
    
    section.classList.remove('hidden');
    pending.classList.add('hidden');
    requestModal.classList.add('hidden');
    decidedMsg.classList.add('hidden');
    
    // Si ya hay una solicitud pendiente
    if (gameData.startRequest && !gameData.startRequest.accepted) {
      const sender = gameData.startRequest.player;
      const senderName = sender === 1 ? gameData.p1 : gameData.p2;
      
      if (sender === myPlayer) {
        // Yo envié la solicitud, mostrar mensaje de espera
        pending.classList.remove('hidden');
        btnIStart.disabled = true;
        btnGiveTurn.disabled = true;
        pending.querySelector('.starter-info').textContent = `⏳ Esperando respuesta de ${gameData.startRequest.player === 1 ? gameData.p2 : gameData.p1}...`;
      } else {
        // El otro envió solicitud, mostrar modal para aceptar/rechazar
        requestModal.classList.remove('hidden');
        document.getElementById('req-sender-name').textContent = senderName;
      }
    } 
    // Si starter ya fue decidido
    else if (gameData.starterDecided && gameData.startingPlayer) {
      decidedMsg.classList.remove('hidden');
      const starterName = gameData.startingPlayer === 1 ? gameData.p1 : gameData.p2;
      document.getElementById('starter-name').textContent = starterName;
      
      // Actualizar el turno inicial según quien deba comenzar
      if (gameData.turn !== (gameData.startingPlayer === 1 ? 'p1' : 'p2')) {
        // Forzar sincronización del turno
        updateDoc(doc(db, "games", roomId), { 
          turn: gameData.startingPlayer === 1 ? 'p1' : 'p2' 
        }).catch(() => {});
      }
    } 
    // Si no hay solicitud ni decisión, mostrar botones normales
    else {
      pending.classList.remove('hidden');
      btnIStart.disabled = false;
      btnGiveTurn.disabled = false;
      pending.querySelector('.starter-info').textContent = '🎮 Define quién comienza la partida';
    }
  }

  // === NUEVO: Solicitar comenzar yo ===
  window.requestStart = async () => {
    if (!gameData || gameData.starterDecided) return;
    try {
      await updateDoc(doc(db, "games", roomId), {
        startRequest: {
          player: myPlayer,
          name: myName,
          timestamp: serverTimestamp(),
          accepted: false
        }
      });
      showAlert("🔄 Solicitud enviada", 'info');
    } catch(e) {
      showAlert("❌ Error al enviar solicitud", 'error');
    }
  };

  // === NUEVO: Ceder turno al otro jugador ===
  window.giveTurn = async () => {
    if (!gameData || gameData.starterDecided) return;
    const otherPlayer = myPlayer === 1 ? 2 : 1;
    try {
      // Establecer directamente que el otro comienza
      await updateDoc(doc(db, "games", roomId), {
        starterDecided: true,
        startingPlayer: otherPlayer,
        turn: otherPlayer === 1 ? 'p1' : 'p2',
        startRequest: null
      });
      showAlert(`✦ Turno cedido a ${otherPlayer === 1 ? gameData.p1 : gameData.p2}`, 'success');
    } catch(e) {
      showAlert("❌ Error al ceder turno", 'error');
    }
  };

  // === NUEVO: Aceptar solicitud de inicio ===
  window.acceptStartRequest = async () => {
    if (!gameData.startRequest || gameData.startRequest.accepted) return;
    const requester = gameData.startRequest.player;
    try {
      await updateDoc(doc(db, "games", roomId), {
        starterDecided: true,
        startingPlayer: requester,
        turn: requester === 1 ? 'p1' : 'p2',
        startRequest: { ...gameData.startRequest, accepted: true }
      });
      showAlert(`✦ ¡${gameData.startRequest.name} comienza!`, 'success');
    } catch(e) {
      showAlert("❌ Error al aceptar", 'error');
    }
  };

  // === NUEVO: Rechazar solicitud de inicio ===
  window.rejectStartRequest = async () => {
    if (!gameData.startRequest) return;
    try {
      await updateDoc(doc(db, "games", roomId), {
        startRequest: null
      });
      showAlert("✗ Solicitud rechazada", 'info');
    } catch(e) {
      showAlert("❌ Error al rechazar", 'error');
    }
  };

  function listenChat() {
    if (chatUnsub) chatUnsub();
    const q = query(collection(db, "games", roomId, "chats"), orderBy("timestamp", "desc"));
    chatUnsub = onSnapshot(q, (snap) => {
      const el = document.getElementById('chat-messages');
      el.innerHTML = '';
      snap.forEach(ds => {
        const m = ds.data();
        const div = document.createElement('div');
        // LÓGICA WHATSAPP: Si soy yo -> derecha (.me), si es otro -> izquierda (.other)
        const isMe = m.sender === myPlayer;
        div.className = isMe ? 'msg me' : 'msg other';
        
        const t = m.timestamp ? new Date(m.timestamp.toMillis()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
        div.innerHTML = `<div class="msg-name">${m.name}</div><div>${m.text}</div><div class="msg-time">${t}</div>`;
        el.appendChild(div);
      });
      
      if (!isChatOpen && snap.docChanges().length > 0 && gameData) {
        const isNew = snap.docChanges().some(c => c.type==='added' && c.doc.data().sender !== myPlayer);
        if (isNew) { 
          unreadCount++; 
          document.getElementById('chat-badge').textContent = unreadCount>9?'9+':unreadCount; 
          document.getElementById('chat-badge').classList.remove('hidden'); 
        }
      }
    });
  }

  window.toggleChat = () => {
    isChatOpen = !isChatOpen;
    document.getElementById('chat-window').classList.toggle('active');
    if (isChatOpen) { unreadCount=0; document.getElementById('chat-badge').classList.add('hidden'); document.getElementById('chat-input').focus(); }
  };
  window.sendChatMessage = async () => {
    const inp = document.getElementById('chat-input');
    const txt = inp.value.trim();
    if (!txt || !roomId) return;
    try { 
      await addDoc(collection(db, "games", roomId, "chats"), { text:txt, sender:myPlayer, name:myName, timestamp:serverTimestamp() }); 
      inp.value=''; 
    } catch(e) { showAlert("❌ No se pudo enviar", 'error'); }
  };
  document.getElementById('chat-input').addEventListener('keypress', e => { if(e.key==='Enter') window.sendChatMessage(); });

  // === TABLERO ===
  function renderBoard() {
    const b = document.getElementById('board'), st = document.getElementById('status'), rb = document.getElementById('btn-rematch');
    const isMyTurn = !gameData.winner && gameData.turn === (myPlayer===1?'p1':'p2');
    document.getElementById('card-p1').classList.remove('active');
    document.getElementById('card-p2').classList.remove('active');
    if(!gameData.winner) document.getElementById(gameData.turn==='p1'?'card-p1':'card-p2').classList.add('active');
    b.innerHTML = '';
    gameData.board.forEach((c,i) => {
      const d = document.createElement('div');
      d.className = 'cell' + (c?` ${c.toLowerCase()} taken`:'');
      if(gameData.winCells && gameData.winCells.includes(i)) d.classList.add('winner');
      d.textContent = c;
      if(!c && isMyTurn && !gameData.winner) d.onclick = () => makeMove(i);
      b.appendChild(d);
    });
    st.className = 'status';
    if(gameData.winner) {
      st.classList.add('finished');
      st.textContent = gameData.winner==='draw'?'🤝 Empate':(gameData.winner===(myPlayer===1?'p1':'p2')?'🎉 Ganaste':'😢 Perdiste');
      rb.classList.remove('hidden');
    } else if(isMyTurn) {
      st.classList.add('my-turn'); st.textContent = '✅ Tu turno'; rb.classList.add('hidden');
    } else {
      st.classList.add('their-turn'); st.textContent = `⏳ Turno de ${myPlayer===1?gameData.p2:gameData.p1}`; rb.classList.add('hidden');
    }
  }
  window.makeMove = async (i) => {
    if(!gameData||gameData.board[i]||gameData.winner||gameData.turn!==(myPlayer===1?'p1':'p2')) return;
    const nb=[...gameData.board]; nb[i]=myPlayer===1?'X':'O';
    const w=checkWin(nb), draw=!w&&!nb.includes("");
    const up={board:nb};
    if(w) Object.assign(up,{winner:w,winCells:getCells(nb,w),status:"finished"});
    else if(draw) Object.assign(up,{winner:'draw',status:"finished"});
    else up.turn=myPlayer===1?'p2':'p1';
    try{await updateDoc(doc(db,"games",roomId),up);}catch(e){}
  };
  function checkWin(b){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let c of p)if(b[c[0]]&&b[c[0]]===b[c[1]]&&b[c[0]]===b[c[2]])return b[c[0]]==='X'?'p1':'p2';return null;}
  function getCells(b,w){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let c of p)if(b[c[0]]&&b[c[0]]===b[c[1]]&&b[c[0]]===b[c[2]])return c;return [];}

  // === REVANCHA ===
  window.requestRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{rematchReq:myPlayer,rematchStat:"pending"});showModal("Solicitud enviada","Esperando respuesta...");}catch(e){}};
  window.acceptRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{board:Array(9).fill(""),turn:"p1",winner:null,winCells:null,rematchReq:null,rematchStat:"none",status:"playing"});}catch(e){}};
  window.rejectRematch=async()=>{try{await updateDoc(doc(db,"games",roomId),{rematchReq:null,rematchStat:"rejected"});}catch(e){}};

  // === REACCIONES ===
  window.toggleEmojiPicker=()=>document.getElementById('emoji-picker').classList.toggle('active');
  window.sendReaction=async(em)=>{
    if(!gameData)return;
    const x=(window.innerWidth/2)-42, y=(window.innerHeight/2)-160;
    try{await updateDoc(doc(db,"games",roomId),{reaction:{emoji:em,sender:myName,x,y}});document.getElementById('emoji-picker').classList.remove('active');}catch(e){}
  };
  window.dismissReaction=async(e)=>{e.stopPropagation();if(gameData.reaction&&gameData.reaction.sender===myName)try{await updateDoc(doc(db,"games",roomId),{reaction:null});}catch(e){}};
  function updateReactionUI(r){
    const bub=document.getElementById('bubble');
    if(!r||!r.emoji){bub.style.display='none';return;}
    bub.style.display='flex';
    document.getElementById('b-emoji').textContent=r.emoji;
    document.getElementById('b-sender').textContent=r.sender;
    if(r.x!==undefined&&r.y!==undefined){bub.style.left=r.x+'px';bub.style.top=r.y+'px';}
    else{bub.style.left=(window.innerWidth/2-42)+'px';bub.style.top=(window.innerHeight/2-160)+'px';}
  }
  const bubble=document.getElementById('bubble');
  bubble.addEventListener('pointerdown',e=>{isDragging=true;bubble.setPointerCapture(e.pointerId);bubble.style.transition='none';});
  bubble.addEventListener('pointermove',e=>{
    if(!isDragging)return;e.preventDefault();
    let x=e.clientX-42, y=e.clientY-42;
    x=Math.max(0,Math.min(window.innerWidth-85,x));
    y=Math.max(0,Math.min(window.innerHeight-85,y));
    bubble.style.left=x+'px';bubble.style.top=y+'px';
  });
  bubble.addEventListener('pointerup',async e=>{
    if(!isDragging)return;isDragging=false;bubble.style.transition='transform 0.1s';bubble.releasePointerCapture(e.pointerId);
    if(gameData.reaction)try{await updateDoc(doc(db,"games",roomId),{"reaction.x":parseInt(bubble.style.left),"reaction.y":parseInt(bubble.style.top)});}catch(e){}
  });

  // === UTILIDADES ===
  window.copyCode=()=>navigator.clipboard.writeText(roomId).then(()=>showAlert("✅ Código copiado", 'success'));
  window.leaveGame=async()=>{
    if(unsub)unsub();if(chatUnsub)chatUnsub();clearSession();
    if(myPlayer===1&&roomId)try{await deleteDoc(doc(db,"games",roomId));}catch(e){}
    document.getElementById('chat-container').classList.remove('active');
    document.getElementById('reaction-container').classList.remove('active');
    document.getElementById('emoji-picker').classList.remove('active');
    document.getElementById('chat-window').classList.remove('active');
    document.getElementById('bubble').style.display='none';
    document.getElementById('btn-rematch').classList.add('hidden');
    showView('view-menu');
    document.getElementById('name-create').value='';document.getElementById('name-join').value='';document.getElementById('code-join').value='';
    unreadCount=0;isChatOpen=false;
    showAlert("👋 Sala cerrada", 'info');
  };

  // === INIT ===
  (function init(){
    document.getElementById('board').innerHTML=Array(9).fill('<div class="cell"></div>').join('');
    if(loadSession()){showView('view-game');listenGame();}else{showView('view-menu');}
  })();
</script>
</body>
</html>
